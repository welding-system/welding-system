
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熔接線 — 批次分配後台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  body { font-family: -apple-system, "Noto Sans TC", sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="bg-slate-950 text-slate-100">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// =====================================================
//  API 設定
// =====================================================
const API_URL = "https://script.google.com/macros/s/AKfycbxITB84zMMmsoA85EysG_OnOdW8U7yoCLihJlCE-SRC4FX_9Y1JfOdET7fLp9ga0yUUQw/exec";

const LINES = ['1號線','2號線','3號線','4號線','5號線','6號線','7號線','8號線'];

// ★ 產品線代號前綴（目前固定不變，未來若有新產品線可在此擴充對照）
const PRODUCT_LINE_PREFIX = "118ARF";

// 顏色代碼對照（與面板共用）
const COLOR_CODE_MAP = {
  "4F": "灰", "4E": "黑", "6D": "稜線灰", "6E": "荒徑綠", "6C": "煙嵐紫",
};

// 不良原因清單（與面板共用，用於待判回填表單）
const INITIAL_DEFECT_REASONS = [
  '熔接不良(正)', '熔接不良(反)', '熔接不良(側)', '熔接不良(底)',
  '損傷', '組裝不良', '機台操作不當',
  '髒污', '按鈕對位', '相機鍵異常', '異色點', '鏟傷多肉', '其他'
];

// 機型 + 顏色 → 目標產量對照（與面板共用，1.1倍）
// ★ 型號/顏色資料：預設值，可在主管後台動態新增，存在 localStorage
const DEFAULT_MODEL_DATA = {
  "297": { label: "297 / I 15 Pro",              colors: [{ name: "灰", code: "4F", target: 0   }, { name: "黑", code: "4E", target: 0   }] },
  "298": { label: "298 / I 15 Promax",           colors: [{ name: "灰", code: "4F", target: 206 }, { name: "黑", code: "4E", target: 449 }] },
  "325": { label: "325 / I 16",                  colors: [{ name: "灰", code: "4F", target: 200 }, { name: "黑", code: "4E", target: 472 }] },
  "326": { label: "326 / I 16 Plus",             colors: [{ name: "灰", code: "4F", target: 162 }, { name: "黑", code: "4E", target: 0   }] },
  "327": { label: "327 / I 16 Pro",              colors: [{ name: "灰", code: "4F", target: 273 }, { name: "黑", code: "4E", target: 307 }] },
  "328": { label: "328 / I 16 Promax",           colors: [{ name: "灰", code: "4F", target: 216 }, { name: "黑", code: "4E", target: 449 }] },
  "342": { label: "342 / I 16e",                 colors: [{ name: "灰", code: "4F", target: 282 }, { name: "黑", code: "4E", target: 582 }] },
  "350": { label: "350 / I 17",                  colors: [{ name: "灰", code: "4F", target: 245 }, { name: "黑", code: "4E", target: 267 }] },
  "351": { label: "351 / I 17 Air",              colors: [{ name: "灰", code: "4F", target: 231 }, { name: "黑", code: "4E", target: 0   }] },
  "352": { label: "352 / I 17 Pro",              colors: [{ name: "灰", code: "4F", target: 308 }, { name: "黑", code: "4E", target: 522 }] },
  "353": { label: "353 / I 17 Promax",           colors: [{ name: "灰", code: "4F", target: 185 }, { name: "黑", code: "4E", target: 557 }] },
  "372": { label: "372 / S26",                   colors: [{ name: "灰", code: "4F", target: 191 }, { name: "黑", code: "4E", target: 353 }] },
  "374": { label: "374 / S26 Ultra",             colors: [{ name: "灰", code: "4F", target: 229 }, { name: "黑", code: "4E", target: 348 }] },
  "394": { label: "394 / I 17 Pro · I 18 Pro",  colors: [{ name: "稜線灰", code: "6D", target: 0 }, { name: "荒徑綠", code: "6E", target: 0 }, { name: "煙嵐紫", code: "6C", target: 0 }, { name: "灰", code: "4F", target: 0 }, { name: "黑", code: "4E", target: 0 }] },
  "395": { label: "395 / I 17 Promax · I 18 Promax", colors: [{ name: "稜線灰", code: "6D", target: 0 }, { name: "荒徑綠", code: "6E", target: 0 }, { name: "煙嵐紫", code: "6C", target: 0 }, { name: "灰", code: "4F", target: 0 }, { name: "黑", code: "4E", target: 0 }] },
};

// 從 localStorage 載入自訂資料，沒有就用預設
function loadModelData() {
  try {
    const saved = localStorage.getItem('weld_model_data');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_MODEL_DATA));
}

function saveModelData(data) {
  try { localStorage.setItem('weld_model_data', JSON.stringify(data)); } catch(e) {}
}

function getColorsForModel(modelCode, modelData) {
  return (modelData || loadModelData())[modelCode]?.colors || [];
}

async function callAPI(payload) {
  try {
    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors", // Apps Script 跨域限制，改用 no-cors（無法讀回應內容，但能送出成功）
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    return { status: "ok" }; // no-cors 模式下永遠拿不到真正回應，假設送出成功
  } catch (e) {
    console.error("API 呼叫失敗:", e);
    return { status: "error", message: "網路連線失敗，請檢查網路或稍後再試" };
  }
}

function Toast({ message, onClose }) {
  useEffect(() => {
    if (!message) return;
    const t = setTimeout(onClose, 4500);
    return () => clearTimeout(t);
  }, [message]);
  if (!message) return null;
  return (
    <div className="fixed bottom-6 right-6 max-w-md bg-slate-800 border border-emerald-500 text-emerald-300 px-5 py-3 rounded-xl shadow-2xl z-50 font-bold">
      {message}
    </div>
  );
}

function App() {
  const [batches, setBatches] = useState([]);
  const [modelData, setModelData] = useState(() => loadModelData()); // ★ 型號/顏色資料（可動態新增）
  const [showModelMgr, setShowModelMgr] = useState(false);          // ★ 型號管理 Modal
  const [editingModel, setEditingModel] = useState(null);            // 正在編輯的型號代碼
  const [newColorName, setNewColorName] = useState('');
  const [newColorCode, setNewColorCode] = useState('');
  const [newModelCode, setNewModelCode] = useState('');
  const [newModelLabel, setNewModelLabel] = useState('');
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState('');
  const [showCreateModal, setShowCreateModal] = useState(false);
  const [submitting, setSubmitting] = useState(false); // 送出中 loading 狀態
  const [statusFilter, setStatusFilter] = useState('進行中');
  const [operatorsList, setOperatorsList] = useState([]);
  const [allBatchesForCards, setAllBatchesForCards] = useState([]); // ★ 線別卡片專用，不受下方篩選器影響，固定抓全部

  useEffect(() => {
    fetch(`${API_URL}?action=config`)
      .then(res => res.json())
      .then(data => { if (data.status === 'ok' && data.operators) setOperatorsList(data.operators); })
      .catch(() => {});
  }, []);

  // 新批次表單
  const [form, setForm] = useState({
    line: '', modelCode: '', colorCode: '', model: '', color: '',
    batchNo: '第一批', innerTotal: '', outerTotal: '', target: '', creator: '', note: '',
  });

  const fetchBatches = (filter) => {
    setLoading(true);
    fetch(`${API_URL}?action=batch_all${filter ? '&status='+encodeURIComponent(filter) : ''}`)
      .then(res => res.json())
      .then(data => { if (data.status === 'ok') setBatches(data.batches || []); setLoading(false); })
      .catch(() => setLoading(false));
  };

  // ★ 給線別卡片用的，固定抓全部狀態（不分篩選），確保「排隊中」也能顯示在卡片上
  const fetchAllForCards = () => {
    fetch(`${API_URL}?action=batch_all`)
      .then(res => res.json())
      .then(data => { if (data.status === 'ok') setAllBatchesForCards(data.batches || []); })
      .catch(() => {});
  };

  useEffect(() => { fetchBatches(statusFilter); fetchAllForCards(); }, [statusFilter]);

  // 哪些線目前有進行中批次（用來顯示「將會排隊」提示，不再擋住分配）
  const occupiedLines = useMemo(() => {
    return new Set(allBatchesForCards.filter(b => b.status === '進行中').map(b => b.line));
  }, [allBatchesForCards]);

  const resetForm = () => setForm({ line: '', modelCode: '', colorCode: '', model: '', color: '', batchNo: '第一批', innerTotal: '', outerTotal: '', target: '', creator: '', note: '' });

  const handleCreate = async () => {
    // ★ 完整料號 = 產品線前綴 + 型號代碼 + 顏色代碼（例：118ARF2974F）
    const fullModel = form.modelCode === '__new'
      ? PRODUCT_LINE_PREFIX + form.model + form.colorCode
      : PRODUCT_LINE_PREFIX + form.modelCode + form.colorCode;
    if (!form.line) { setToast('⚠️ 請選擇線別'); return; }
    if (!(form.modelCode || form.model)) { setToast('⚠️ 請選擇或輸入型號'); return; }
    if (!form.innerTotal || !form.outerTotal) { setToast('⚠️ 請填寫內外層發料總量'); return; }
    // ★ 不再擋住已佔用的線別，後端會自動排入隊列，等目前批次結批後自動接續

    const displayColor = form.modelCode === '__new' ? form.color : (COLOR_CODE_MAP[form.colorCode] || form.color);

    setSubmitting(true);
    const result = await callAPI({
      type: 'batch_create',
      line: form.line,
      model: fullModel,
      color: displayColor,
      batchNo: form.batchNo,
      innerTotal: parseInt(form.innerTotal) || 0,
      outerTotal: parseInt(form.outerTotal) || 0,
      target: parseInt(form.target) || 0,
      creator: form.creator,
      note: form.note,
    });

    if (result.status === 'ok') {
      const assignedLine = form.line, assignedModel = fullModel;
      setShowCreateModal(false);
      resetForm();
      // 等待後端寫入完成後重新抓取清單，並用實際抓到的資料確認是否真的成功
      // ★ 查全部狀態（不限「進行中」），因為這筆可能是排入隊列（狀態=排隊中）
      setTimeout(() => {
        fetch(`${API_URL}?action=batch_all`)
          .then(res => res.json())
          .then(data => {
            setSubmitting(false);
            const found = (data.batches || []).find(b =>
              b.line === assignedLine && b.model === assignedModel &&
              (b.status === '進行中' || b.status === '排隊中')
            );
            if (found && found.status === '進行中') {
              setToast(`✅ 批次建立成功並開始生產：${assignedLine} — ${assignedModel}`);
            } else if (found && found.status === '排隊中') {
              setToast(`✅ 批次已排入隊列（第${found.queueOrder}順位）：${assignedLine} — ${assignedModel}，等目前批次結批後自動接續`);
            } else {
              setToast(`⚠️ 已送出，但尚未確認成功，請按「刷新」確認 ${assignedLine} 的狀態`);
            }
            fetchBatches(statusFilter); fetchAllForCards();
          })
          .catch(() => {
            setSubmitting(false);
            setToast('⚠️ 已送出，請按「刷新」確認結果');
            fetchBatches(statusFilter); fetchAllForCards();
          });
      }, 1500);
    } else {
      setSubmitting(false);
      setToast('❌ ' + (result.message || '建立失敗'));
    }
  };

  const handleClose = async (batch) => {
    if (!confirm(`確認結批：${batch.line} — ${batch.model}${batch.color}？\n完成數量：${batch.completed} / 目標：${batch.target}`)) return;
    const result = await callAPI({ type: 'batch_close', batchId: batch.batchId, closer: '主管', note: '後台手動結批' });
    if (result.status === 'ok') {
      setToast('✅ 已結批，正在確認...');
      setTimeout(() => { fetchBatches(statusFilter); fetchAllForCards(); }, 1200);
    } else {
      setToast('❌ ' + (result.message || '結批失敗'));
    }
  };

  // ★ 刪除批次（需二次確認）
  const handleDelete = async (batch) => {
    const confirmed = confirm(
      `⚠️ 確定要完全刪除這筆批次嗎？此操作無法復原！\n\n` +
      `線別：${batch.line}\n型號：${batch.model}${batch.color}\n批號：${batch.batchNo}\n` +
      `完成數量：${batch.completed} / 目標：${batch.target}`
    );
    if (!confirmed) return;
    const result = await callAPI({ type: 'batch_delete', batchId: batch.batchId });
    if (result.status === 'ok') {
      setToast('🗑️ 已送出刪除請求，正在確認...');
      setTimeout(() => { fetchBatches(statusFilter); fetchAllForCards(); }, 1200);
    } else {
      setToast('❌ ' + (result.message || '刪除失敗'));
    }
  };

  // ★ 取消結批（已結批 → 進行中）
  const handleUnclose = async (batch) => {
    if (!confirm(`取消結批：${batch.line} — ${batch.model}${batch.color}？\n此批將恢復為「進行中」狀態。`)) return;
    const result = await callAPI({ type: 'batch_unclose', batchId: batch.batchId });
    if (result.status === 'ok') { setToast('✅ 已取消結批，恢復為進行中'); setTimeout(() => { fetchBatches(statusFilter); fetchAllForCards(); }, 1200); }
    else setToast('❌ ' + (result.message || '操作失敗'));
  };

  // ★ 暫停批次（進行中 → 暫停中）
  const handlePause = async (batch) => {
    const reason = prompt(`暫停原因（如：插單趕料）：`, '插單趕料');
    if (reason === null) return;
    const result = await callAPI({ type: 'batch_pause', batchId: batch.batchId, reason });
    if (result.status === 'ok') { setToast('⏸️ 批次已暫停'); setTimeout(() => { fetchBatches(statusFilter); fetchAllForCards(); }, 1200); }
    else setToast('❌ ' + (result.message || '操作失敗'));
  };

  // ★ 恢復批次（暫停中 → 進行中，同線繼續）
  const handleResume = async (batch) => {
    if (!confirm(`恢復批次：${batch.line} — ${batch.model}${batch.color}？`)) return;
    const result = await callAPI({ type: 'batch_resume', batchId: batch.batchId });
    if (result.status === 'ok') { setToast('▶️ 批次已恢復為進行中'); setTimeout(() => { fetchBatches(statusFilter); fetchAllForCards(); }, 1200); }
    else setToast('❌ ' + (result.message || '操作失敗'));
  };

  // ★ 換線：結原批 + 在目標線用剩餘量開新批次
  const handleTransfer = async (batch) => {
    const newLine = prompt(`將此批次換線到哪條線？\n\n系統會：\n1. 結批 ${batch.line} 的這筆帳\n2. 用剩餘料（內:${batch.innerRemaining} / 外:${batch.outerRemaining}）在新線開新批次\n\n輸入目標線別（如：3號線）：`, '');
    if (!newLine || !newLine.trim()) return;
    if (!LINES.includes(newLine.trim())) { setToast('⚠️ 無效的線別名稱'); return; }
    const result = await callAPI({ type: 'batch_transfer', batchId: batch.batchId, newLine: newLine.trim() });
    if (result.status === 'ok') {
      setToast(`✅ 換線完成：${batch.line} 已結批，${newLine} 已開新批次`);
      setTimeout(() => { fetchBatches(statusFilter); fetchAllForCards(); }, 1200);
    } else {
      setToast('❌ ' + (result.message || '操作失敗'));
    }
  };

  // ★ 編輯批次：開啟編輯 Modal，並把現有資料帶入表單
  const [showEditModal, setShowEditModal] = useState(false);
  const [editForm, setEditForm] = useState(null); // 正在編輯的批次完整資料 + batchId

  // ★ 批次詳情查看：跨班次彙整總計 + 關聯待判記錄
  const [showDetailModal, setShowDetailModal] = useState(false);
  const [detailData, setDetailData] = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);
  const [detailResolveRows, setDetailResolveRows] = useState([]); // 保留（作業員面板還在用同名邏輯）
  const [detailResolvingPendingId, setDetailResolvingPendingId] = useState(null);
  // ★ 新版回填：兩個數字框
  const [resolveGoodQty, setResolveGoodQty] = useState('');
  const [resolveBadQty, setResolveBadQty] = useState('');
  const [resolveBadReason, setResolveBadReason] = useState('');

  const openDetailModal = (batch) => {
    setShowDetailModal(true);
    setDetailLoading(true);
    setDetailData(null);
    fetch(`${API_URL}?action=batch_detail&batchId=${encodeURIComponent(batch.batchId)}`)
      .then(res => res.json())
      .then(data => { setDetailData(data); setDetailLoading(false); })
      .catch(() => setDetailLoading(false));
  };

  const startDetailResolving = (item) => {
    setDetailResolvingPendingId(item.pendingId);
    setResolveGoodQty(String(item.remainingQty)); // 預設全部轉良品
    setResolveBadQty('0');
    setResolveBadReason('');
  };

  const submitDetailResolve = async (item) => {
    const goodQty = parseInt(resolveGoodQty) || 0;
    const badQty  = parseInt(resolveBadQty)  || 0;
    const total   = goodQty + badQty;

    if (total <= 0)                      { setToast('⚠️ 請填寫轉良品或確定不良的數量'); return; }
    if (total > item.remainingQty)       { setToast(`⚠️ 合計數量(${total})超過剩餘未結案(${item.remainingQty})`); return; }
    if (badQty > 0 && !resolveBadReason) { setToast('⚠️ 有確定不良數量，請選擇不良原因'); return; }

    const resolutions = [];
    if (goodQty > 0) resolutions.push({ result: '良品', qty: goodQty });
    if (badQty  > 0) resolutions.push({ result: resolveBadReason, qty: badQty });

    await callAPI({
      type: 'pending_resolve',
      pendingId: item.pendingId,
      resolutions,
      resolver: '主管',
      note: `主管回填：轉良品×${goodQty}${badQty > 0 ? `，確定不良×${badQty}(${resolveBadReason})` : ''}`,
    });
    setToast(`✅ 已回填：轉良品 ${goodQty}${badQty > 0 ? `，確定不良 ${badQty}` : ''}`);
    setDetailResolvingPendingId(null);
    setTimeout(() => {
      const currentBatchId = detailData?.batch?.batchId;
      if (currentBatchId) {
        fetch(`${API_URL}?action=batch_detail&batchId=${encodeURIComponent(currentBatchId)}`)
          .then(res => res.json()).then(data => setDetailData(data));
      }
    }, 800);
  };

  const openEditModal = (batch) => {
    setEditForm({
      batchId: batch.batchId,
      line: batch.line,
      model: batch.model,
      color: batch.color,
      batchNo: batch.batchNo,
      innerTotal: batch.innerTotal,
      outerTotal: batch.outerTotal,
      target: batch.target,
      innerDeducted: batch.innerDeducted, // 顯示用，不可編輯
      outerDeducted: batch.outerDeducted, // 顯示用，不可編輯
    });
    setShowEditModal(true);
  };

  const handleEditSubmit = async () => {
    if (!editForm.line) { setToast('⚠️ 線別不可為空'); return; }
    if (!editForm.model) { setToast('⚠️ 型號不可為空'); return; }
    if (editForm.innerTotal === '' || editForm.outerTotal === '') { setToast('⚠️ 請填寫發料總量'); return; }

    const result = await callAPI({
      type: 'batch_edit',
      batchId: editForm.batchId,
      line: editForm.line,
      model: editForm.model,
      color: editForm.color,
      batchNo: editForm.batchNo,
      innerTotal: parseInt(editForm.innerTotal) || 0,
      outerTotal: parseInt(editForm.outerTotal) || 0,
      target: parseInt(editForm.target) || 0,
      editor: '主管',
    });

    if (result.status === 'ok') {
      setShowEditModal(false);
      setToast('✅ 已送出編輯，正在確認...');
      setTimeout(() => { fetchBatches(statusFilter); fetchAllForCards(); }, 1200);
    } else {
      setToast('❌ ' + (result.message || '編輯失敗'));
    }
  };

  return (
    <div className="min-h-screen p-6 lg:p-10">
      <Toast message={toast} onClose={() => setToast('')} />

      {/* Header */}
      <div className="flex items-center justify-between mb-8 flex-wrap gap-4">
        <div>
          <h1 className="text-3xl font-bold text-emerald-400 flex items-center gap-3">
            <i className="fa-solid fa-layer-group"></i> 熔接線批次分配後台
          </h1>
          <p className="text-slate-500 text-sm mt-1">分配批次到產線，作業員開班時自動帶入</p>
        </div>
        <div className="flex gap-2">

              <h3 className="text-xl font-bold text-white flex items-center gap-2">
                <i className="fa-solid fa-tags text-emerald-400"></i> 型號 / 顏色管理
              </h3>
              <button onClick={() => { setShowModelMgr(false); setEditingModel(null); }}
                className="text-slate-400 hover:text-white px-3 py-2 rounded-xl hover:bg-slate-800">
                <i className="fa-solid fa-xmark text-xl"></i>
              </button>
            </div>

            <div className="flex-1 overflow-y-auto p-5 space-y-4">
              {/* 新增型號 */}
              <div className="bg-slate-800/40 rounded-xl p-4">
                <div className="text-slate-400 text-xs font-bold mb-3">新增型號</div>
                <div className="flex gap-2">
                  <input type="text" value={newModelCode} onChange={e => setNewModelCode(e.target.value)}
                    placeholder="型號代碼（如：396）"
                    className="flex-1 bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500 text-white"
                  />
                  <input type="text" value={newModelLabel} onChange={e => setNewModelLabel(e.target.value)}
                    placeholder="型號名稱（如：396 / I 18）"
                    className="flex-[2] bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500 text-white"
                  />
                  <button onClick={() => {
                    if (!newModelCode.trim() || !newModelLabel.trim()) return;
                    if (modelData[newModelCode]) { alert('此型號代碼已存在'); return; }
                    const updated = { ...modelData, [newModelCode.trim()]: { label: newModelLabel.trim(), colors: [] } };
                    setModelData(updated); saveModelData(updated);
                    setNewModelCode(''); setNewModelLabel('');
                  }} className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 py-2.5 rounded-lg text-sm whitespace-nowrap">
                    新增型號
                  </button>
                </div>
              </div>

              {/* 各型號的顏色管理 */}
              {Object.entries(modelData).map(([code, info]) => (
                <div key={code} className="bg-slate-800/30 rounded-xl p-4">
                  <div className="flex justify-between items-center mb-3">
                    <div className="font-bold text-white">{info.label}</div>
                    <button onClick={() => setEditingModel(editingModel === code ? null : code)}
                      className="text-xs text-cyan-400 hover:text-cyan-300 font-bold px-3 py-1 rounded-lg bg-cyan-950/30 hover:bg-cyan-950/50">
                      {editingModel === code ? '收起' : '管理顏色'}
                    </button>
                  </div>
                  <div className="flex flex-wrap gap-2 mb-2">
                    {info.colors.map((c, idx) => (
                      <div key={idx} className="flex items-center gap-1.5 bg-slate-700/60 rounded-lg px-2.5 py-1 text-xs">
                        <span className="text-white font-bold">{c.name}</span>
                        <span className="text-slate-400">({c.code})</span>
                        {editingModel === code && (
                          <button onClick={() => {
                            const updated = JSON.parse(JSON.stringify(modelData));
                            updated[code].colors.splice(idx, 1);
                            setModelData(updated); saveModelData(updated);
                          }} className="text-red-400 hover:text-red-300 ml-1">
                            <i className="fa-solid fa-xmark text-xs"></i>
                          </button>
                        )}
                      </div>
                    ))}
                    {info.colors.length === 0 && <span className="text-slate-600 text-xs">尚未設定顏色</span>}
                  </div>
                  {editingModel === code && (
                    <div className="flex gap-2 mt-3 pt-3 border-t border-slate-700">
                      <input type="text" value={newColorName} onChange={e => setNewColorName(e.target.value)}
                        placeholder="顏色名稱（如：沙漠金）"
                        className="flex-1 bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-emerald-500 text-white"
                      />
                      <input type="text" value={newColorCode} onChange={e => setNewColorCode(e.target.value)}
                        placeholder="顏色代碼（如：6F）"
                        className="w-28 bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-emerald-500 text-white"
                      />
                      <button onClick={() => {
                        if (!newColorName.trim() || !newColorCode.trim()) return;
                        const updated = JSON.parse(JSON.stringify(modelData));
                        updated[code].colors.push({ name: newColorName.trim(), code: newColorCode.trim().toUpperCase(), target: 0 });
                        setModelData(updated); saveModelData(updated);
                        setNewColorName(''); setNewColorCode('');
                      }} className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 py-2 rounded-lg text-sm whitespace-nowrap">
                        新增顏色
                      </button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ★ 批次詳情 Modal（跨班次總計 + 關聯待判記錄） */}
      {showDetailModal && (
        <div className="fixed inset-0 bg-black/75 flex items-center justify-center z-50 p-4">
          <div className="bg-slate-900 border border-cyan-500 rounded-2xl w-full max-w-3xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
            <div className="flex justify-between items-center p-5 border-b border-slate-800 shrink-0">
              <h3 className="text-xl font-bold text-cyan-400 flex items-center gap-2">
                <i className="fa-solid fa-chart-simple"></i> 批次詳情彙整
              </h3>
              <button onClick={() => { setShowDetailModal(false); setDetailData(null); }} className="text-slate-400 hover:text-white px-3 py-2 rounded-xl hover:bg-slate-800">
                <i className="fa-solid fa-xmark text-xl"></i>
              </button>
            </div>

            <div className="flex-1 overflow-y-auto p-5 space-y-5">
              {detailLoading && (
                <div className="text-center py-12 text-slate-500">
                  <i className="fa-solid fa-spinner fa-spin text-2xl mb-2 block"></i>載入彙整資料中...
                </div>
              )}

              {!detailLoading && detailData && detailData.status === 'ok' && (
                <>
                  {/* 批次基本資訊 */}
                  <div className="bg-slate-800/40 rounded-xl p-4 flex justify-between items-center">
                    <div>
                      <div className="text-2xl font-bold text-white font-mono">{detailData.batch.model}{detailData.batch.color}</div>
                      <div className="text-slate-400 text-sm mt-1">{detailData.batch.line} ・ {detailData.batch.batchNo} ・ 共經歷 {detailData.shiftCount} 個班次</div>
                    </div>
                    <span className={`text-xs font-bold px-3 py-1.5 rounded-full ${detailData.batch.batchStatus==='進行中' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700 text-slate-400'}`}>
                      {detailData.batch.batchStatus}
                    </span>
                  </div>

                  {/* ★ 多肉未回填警示（從備註欄偵測） */}
                  {detailData.batch.note && detailData.batch.note.includes('多肉待回填') && (
                    <div className="bg-orange-950/40 border-2 border-orange-500 rounded-xl p-4 flex items-center gap-3">
                      <i className="fa-solid fa-triangle-exclamation text-orange-400 text-2xl shrink-0"></i>
                      <div>
                        <div className="text-orange-400 font-bold">{detailData.batch.note.match(/⚠️[^】]*/)?.[0] || '⚠️ 結批時有多肉未回填'}</div>
                        <div className="text-slate-500 text-xs mt-0.5">此批次的成品數量可能尚未完整，請與作業員確認多肉加工結果。</div>
                      </div>
                    </div>
                  )}

                  {/* 跨班次總計：10個框 */}
                  <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                    {[
                      { label: '總投入數', val: detailData.summary.input, color: 'text-blue-400', bg: 'bg-blue-950/30' },
                      { label: '總良品', val: detailData.summary.good, color: 'text-emerald-400', bg: 'bg-emerald-950/30' },
                      { label: '總不良品', val: detailData.summary.defect, color: 'text-red-400', bg: 'bg-red-950/30' },
                      { label: '總良率', val: detailData.summary.yieldRate + '%', color: 'text-purple-400', bg: 'bg-purple-950/30' },
                      { label: '總重工', val: detailData.summary.rework, color: 'text-orange-400', bg: 'bg-orange-950/30' },
                      { label: '總首件消耗', val: detailData.summary.faiCount, color: 'text-cyan-400', bg: 'bg-cyan-950/30' },
                      { label: '內層良品餘數', val: detailData.batch.innerRemaining, color: 'text-cyan-300', bg: 'bg-cyan-950/20' },
                      { label: '外層良品餘數', val: detailData.batch.outerRemaining, color: 'text-amber-300', bg: 'bg-amber-950/20' },
                      { label: '內層來料不良', val: detailData.summary.incomingInnerDefect, color: 'text-pink-400', bg: 'bg-pink-950/30' },
                      { label: '外層來料不良', val: detailData.summary.incomingOuterDefect, color: 'text-pink-400', bg: 'bg-pink-950/30' },
                    ].map(item => (
                      <div key={item.label} className={`${item.bg} rounded-xl p-4 text-center`}>
                        <div className="text-slate-500 text-xs font-bold mb-1">{item.label}</div>
                        <div className={`text-2xl font-mono font-bold ${item.color}`}>{item.val}</div>
                      </div>
                    ))}
                  </div>

                  {/* 不良分類明細 */}
                  {Object.keys(detailData.defectBreakdown).length > 0 && (
                    <div className="bg-slate-800/30 rounded-xl p-4">
                      <div className="text-slate-400 text-xs font-bold mb-3">不良分類明細</div>
                      <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                        {Object.entries(detailData.defectBreakdown).map(([label, qty]) => (
                          <div key={label} className="flex justify-between bg-slate-900/50 rounded-lg px-3 py-2 text-sm">
                            <span className="text-slate-400">{label}</span>
                            <span className="text-red-400 font-bold">{qty}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* ★ 領用清單彙整：誰領走了幾支 */}
                  {(() => {
                    const usageMap = {};
                    detailData.relatedPending.forEach(item => {
                      if (item.samplerName && item.sampledQty > 0) {
                        if (!usageMap[item.samplerName]) usageMap[item.samplerName] = 0;
                        usageMap[item.samplerName] += item.sampledQty;
                      }
                    });
                    const usageList = Object.entries(usageMap);
                    if (usageList.length === 0) return null;
                    const totalTaken = usageList.reduce((sum, [, qty]) => sum + qty, 0);
                    return (
                      <div className="bg-purple-950/20 border border-purple-800/40 rounded-xl p-4">
                        <div className="text-purple-300 text-xs font-bold mb-3 flex items-center gap-2">
                          <i className="fa-solid fa-user-check"></i>
                          本批領用紀錄（共 {totalTaken} 支）
                        </div>
                        <div className="flex flex-wrap gap-2">
                          {usageList.map(([name, qty]) => (
                            <div key={name} className="bg-purple-900/30 border border-purple-700/40 rounded-lg px-3 py-2 flex items-center gap-2">
                              <i className="fa-solid fa-user text-purple-400 text-xs"></i>
                              <span className="text-white font-bold text-sm">{name}</span>
                              <span className="text-purple-300 font-mono font-bold">{qty} 支</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })()}

                  {/* 關聯待判記錄 */}
                  <div>
                    <div className="text-slate-400 text-xs font-bold mb-3 flex items-center gap-2">
                      <i className="fa-solid fa-clipboard-question"></i>
                      此批關聯的待判記錄（{detailData.relatedPending.length} 筆）
                    </div>
                    {detailData.relatedPending.length === 0 && (
                      <div className="text-center text-slate-600 text-sm py-6 bg-slate-800/20 rounded-xl">沒有待判記錄</div>
                    )}
                    <div className="space-y-2">
                      {detailData.relatedPending.map(item => {
                        const notFullyResolved = item.status === '待判中' || item.status === '部分結案';
                        return (
                        <div key={item.pendingId} className={`rounded-xl p-3 border ${notFullyResolved ? 'bg-amber-950/20 border-amber-700/40' : 'bg-slate-800/30 border-slate-700'}`}>
                          {/* 標題列：數量 + 狀態 */}
                          <div className="flex justify-between items-center mb-2">
                            <div className="text-sm font-bold">
                              <span className="text-white">總數量 {item.qty} pcs</span>
                              {item.samplerName && <span className="text-purple-300 ml-2 font-normal text-xs">（{item.samplerName}領走{item.sampledQty}支）</span>}
                            </div>
                            <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${notFullyResolved ? 'bg-amber-500/20 text-amber-400' : 'bg-emerald-500/20 text-emerald-400'}`}>
                              {item.status}
                            </span>
                          </div>

                          {/* 原因 */}
                          <div className="text-xs text-slate-500 mb-2">原因：{item.reason}</div>

                          {/* 已回填結果：轉良品 N / 確定不良 N (原因) */}
                          {item.result && (() => {
                            const parts = item.result.split('|').map(s => s.trim()).filter(Boolean);
                            const goodParts = parts.filter(p => p.startsWith('良品'));
                            const badParts = parts.filter(p => !p.startsWith('良品'));
                            const goodTotal = goodParts.reduce((sum, p) => {
                              const m = p.match(/×(\d+)/);
                              return sum + (m ? parseInt(m[1]) : 0);
                            }, 0);
                            return (
                              <div className="flex flex-wrap gap-2 mt-1">
                                {goodTotal > 0 && (
                                  <span className="bg-emerald-950/40 text-emerald-400 text-xs font-bold px-2.5 py-1 rounded-lg border border-emerald-800/50">
                                    轉良品：{goodTotal}
                                  </span>
                                )}
                                {badParts.map((p, i) => {
                                  const m = p.match(/^(.+)×(\d+)$/);
                                  const reason = m ? m[1] : p;
                                  const qty = m ? m[2] : '';
                                  return (
                                    <span key={i} className="bg-red-950/40 text-red-400 text-xs font-bold px-2.5 py-1 rounded-lg border border-red-800/50">
                                      確定不良：{qty} {reason !== '確定不良' ? `(${reason})` : ''}
                                    </span>
                                  );
                                })}
                                <span className="text-slate-600 text-xs self-center">by {item.resolver}</span>
                              </div>
                            );
                          })()}

                          {notFullyResolved && (
                            detailResolvingPendingId === item.pendingId ? (
                              <div className="mt-3 border-t border-slate-700 pt-3 space-y-3">
                                <div className="text-xs text-slate-400 mb-1">線上待判（可回填）：<span className="text-amber-300 font-bold">{item.remainingQty} 支</span>
                                  {item.sampledQty > 0 && <span className="text-purple-400 ml-2">（已領走 {item.sampledQty} 支不計入）</span>}
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                  <div>
                                    <label className="block text-emerald-400 text-xs font-bold mb-1.5">轉良品</label>
                                    <input type="number" value={resolveGoodQty} min="0" max={item.remainingQty}
                                      onChange={e => {
                                        const v = Math.max(0, Math.min(parseInt(e.target.value)||0, item.remainingQty));
                                        setResolveGoodQty(String(v));
                                        setResolveBadQty(String(item.remainingQty - v));
                                      }}
                                      className="w-full bg-slate-950 border border-emerald-700/50 rounded-xl p-3 text-2xl font-mono font-bold text-emerald-300 outline-none text-center focus:border-emerald-500"
                                    />
                                  </div>
                                  <div>
                                    <label className="block text-red-400 text-xs font-bold mb-1.5">確定不良</label>
                                    <input type="number" value={resolveBadQty} min="0" max={item.remainingQty}
                                      onChange={e => {
                                        const v = Math.max(0, Math.min(parseInt(e.target.value)||0, item.remainingQty));
                                        setResolveBadQty(String(v));
                                        setResolveGoodQty(String(item.remainingQty - v));
                                      }}
                                      className="w-full bg-slate-950 border border-red-700/50 rounded-xl p-3 text-2xl font-mono font-bold text-red-300 outline-none text-center focus:border-red-500"
                                    />
                                  </div>
                                </div>
                                {/* 不良原因：只有確定不良 > 0 才顯示 */}
                                {(parseInt(resolveBadQty) > 0) && (
                                  <div>
                                    <label className="block text-slate-400 text-xs font-bold mb-1.5">不良原因</label>
                                    <select value={resolveBadReason} onChange={e => setResolveBadReason(e.target.value)}
                                      className="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-sm font-bold outline-none focus:border-red-500"
                                    >
                                      <option value="">-- 請選擇不良原因 --</option>
                                      {INITIAL_DEFECT_REASONS.map(r => <option key={r} value={r}>{r}</option>)}
                                    </select>
                                  </div>
                                )}
                                <div className="flex gap-2">
                                  <button onClick={() => submitDetailResolve(item)}
                                    className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl text-sm"
                                  >確認送出</button>
                                  <button onClick={() => setDetailResolvingPendingId(null)} className="text-slate-500 text-sm px-4">取消</button>
                                </div>
                              </div>
                            ) : (
                              <button onClick={() => startDetailResolving(item)}
                                className="mt-2 w-full bg-cyan-700 hover:bg-cyan-600 text-white font-bold py-2 rounded-lg text-xs"
                              >
                                <i className="fa-solid fa-gavel mr-1"></i>回填結果
                              </button>
                            )
                          )}
                        </div>
                        );
                      })}
                    </div>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
