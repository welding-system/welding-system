<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>現場作業員報工終端 - 專業儀表版</title>
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 載入官方穩定版 Babel Standalone (解決 UMD 環境白屏編譯報錯) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- 載入 FontAwesome 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 隱藏滾動條但保留功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 輸入框外觀修正 */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
  </style>
</head>
<body class="bg-slate-950 m-0 overflow-hidden select-none text-slate-100">
  <div id="root"></div>

  <!-- 註冊自訂預設，強制將 Babel Standalone 設定為 classic runtime 避免模組導入衝突 -->
  <script>
    Babel.registerPreset('custom-classic-preset', {
      presets: [
        [Babel.availablePresets['env'], { modules: false }],
        [Babel.availablePresets['react'], { runtime: 'classic' }]
      ]
    });
  </script>

  <!-- 使用自訂註冊的預設進行安全編譯 -->
  <script type="text/babel" data-presets="custom-classic-preset">
    const { useState, useEffect, useMemo } = React;

    // --- 作業員名單改為從 Google Sheets「系統設定」分頁動態讀取 ---
    // 預設值僅在 API 連線失敗時作為備援，正式名單請到 Sheets 編輯，不需要改這支程式
    const FALLBACK_OPERATORS = ['請連線後台讀取人員名單'];

    // =====================================================
    //  【熔接產能對照表】來源：熔接產能對照資料分頁，1.1倍目標
    //  型號資料結構：{ 機型代碼: { 機型名稱, 顏色清單: [{name,code,target}] } }
    //  若有新色尚未統計，作業員可在面板上手動修改目標數量
    // =====================================================
    // =====================================================
    //  顏色代碼對照（後兩碼）
    //  4F=灰 4E=黑 6D=稜線灰 6E=荒徑綠 6C=煙嵐紫
    //  新增顏色直接在此補充即可
    // =====================================================
    const COLOR_CODE_MAP = {
      "4F": "灰",
      "4E": "黑",
      "6D": "稜線灰",
      "6E": "荒徑綠",
      "6C": "煙嵐紫",
    };

    const WELD_MODEL_DATA = {
      // ── 舊機型（有產能統計，1.1倍目標）──────────────────
      "297": { label: "297 / I 15 Pro",              colors: [{ name: "灰", code: "4F", target: 0   }, { name: "黑", code: "4E", target: 0   }] },
      "298": { label: "298 / I 15 Promax",           colors: [{ name: "灰", code: "4F", target: 206 }, { name: "黑", code: "4E", target: 449 }] },
      "325": { label: "325 / I 16",                  colors: [{ name: "灰", code: "4F", target: 200 }, { name: "黑", code: "4E", target: 472 }] },
      "326": { label: "326 / I 16 Plus",             colors: [{ name: "灰", code: "4F", target: 162 }, { name: "黑", code: "4E", target: 0   }] },
      "327": { label: "327 / I 16 Pro",              colors: [{ name: "灰", code: "4F", target: 273 }, { name: "黑", code: "4E", target: 307 }] },
      "328": { label: "328 / I 16 Promax",           colors: [{ name: "灰", code: "4F", target: 216 }, { name: "黑", code: "4E", target: 449 }] },
      "342": { label: "342 / I 16e",                 colors: [{ name: "灰", code: "4F", target: 282 }, { name: "黑", code: "4E", target: 582 }] },
      "350": { label: "350 / I 17",                  colors: [{ name: "灰", code: "4F", target: 245 }, { name: "黑", code: "4E", target: 267 }] },
      "351": { label: "351 / I 17 Air",              colors: [{ name: "灰", code: "4F", target: 231 }, { name: "黑", code: "4E", target: 0   }] },
      "352": { label: "352 / I 17 Pro",              colors: [{ name: "灰", code: "4F", target: 308 }, { name: "黑", code: "4E", target: 522 }] },
      "353": { label: "353 / I 17 Promax",           colors: [{ name: "灰", code: "4F", target: 185 }, { name: "黑", code: "4E", target: 557 }] },
      "372": { label: "372 / S26",                   colors: [{ name: "灰", code: "4F", target: 191 }, { name: "黑", code: "4E", target: 353 }] },
      "374": { label: "374 / S26 Ultra",             colors: [{ name: "灰", code: "4F", target: 229 }, { name: "黑", code: "4E", target: 348 }] },
      // ── 新機型（尚無產能統計，目標請手動輸入）──────────
      "394": { label: "394 / I 17 Pro · I 18 Pro",  colors: [{ name: "稜線灰", code: "6D", target: 0 }, { name: "荒徑綠", code: "6E", target: 0 }, { name: "煙嵐紫", code: "6C", target: 0 }, { name: "灰", code: "4F", target: 0 }, { name: "黑", code: "4E", target: 0 }] },
      "395": { label: "395 / I 17 Promax · I 18 Promax", colors: [{ name: "稜線灰", code: "6D", target: 0 }, { name: "荒徑綠", code: "6E", target: 0 }, { name: "煙嵐紫", code: "6C", target: 0 }, { name: "灰", code: "4F", target: 0 }, { name: "黑", code: "4E", target: 0 }] },
    };

    // 查詢目標產量（機型代碼 + 顏色代碼）
    function getWeldTarget(modelCode, colorCode) {
      const m = WELD_MODEL_DATA[modelCode];
      if (!m) return 0;
      const c = m.colors.find(x => x.code === colorCode);
      return c ? c.target : 0;
    }

    // 取得某機型的顏色清單
    function getColorsForModel(modelCode) {
      return WELD_MODEL_DATA[modelCode]?.colors || [];
    }

    // 固定不良原因清單（順序必須與 Sheets「熔接報工紀錄」欄位一致）
    const INITIAL_DEFECT_REASONS = [
      '熔接不良(正)', '熔接不良(反)', '熔接不良(側)', '熔接不良(底)', 
      '損傷', '組裝不良', '機台操作不當',
      '髒污', '按鈕對位', '相機鍵異常', '異色點', '鏟傷多肉', '其他'
    ];

    // ── API 設定 ──────────────────────────────────────────────
    const API_URL = "https://script.google.com/macros/s/AKfycbxITB84zMMmsoA85EysG_OnOdW8U7yoCLihJlCE-SRC4FX_9Y1JfOdET7fLp9ga0yUUQw/exec";

    // ★ 如果網址有 ?clear=1，自動清除 localStorage 並跳回登入
    if (new URLSearchParams(location.search).get('clear') === '1') {
      try { localStorage.removeItem('welding_panel_state'); } catch(e){}
      history.replaceState({}, '', location.pathname);
    }

    async function sendToAPI(payload) {
      try {
        await fetch(API_URL, { method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
      } catch(e) { console.warn("送出失敗:", e); }
    }

    // ★ 需要回傳值的 API 呼叫（用 GET + 參數，避免 CORS 問題）
    async function sendToAPIWithResponse(payload) {
      try {
        const params = new URLSearchParams({
          action: 'post_with_response',
          data: JSON.stringify(payload)
        });
        const res = await fetch(`${API_URL}?${params}`);
        const result = await res.json();
        console.log('sendToAPIWithResponse result:', payload.type, result);
        return result;
      } catch(e) { console.warn("送出失敗:", e); return null; }
    }
    function getCurrentPeriod() {
      const now = new Date(), h = now.getHours();
      return `${String(h).padStart(2,'0')}:00-${String(h+1).padStart(2,'0')}:00`;
    }

    function App() {
      // 🌟 APP 畫面控制：'login'=接班登入(初始) | 'production'=生產中 | 'batch'=換批設定
      const [appScreen, setAppScreen] = useState('login');

      // 1. 產線與批次資訊（初始全空白，等登入後填入）
      const [lineInfo, setLineInfo] = useState({
        name: '1號線',
        assembler: '',
        machineOp: '',
        inspector: '',
        workerCount: '',   // ★ 加工人數
        model: '',
        color: '',
        modelCode: '',
        colorCode: '',
        batch: '第一批',
        target: 0
      });
      const [shiftStartTime, setShiftStartTime] = useState(null); // ★ 開班時間（自動記錄）

      // 2. 核心報工計數狀態（全部從 0 開始）
      const [goodCount, setGoodCount] = useState(0);
      
      const [reworkDetails, setReworkDetails] = useState({'正面': 0, '背面': 0, '側邊': 0, '底部': 0});
      // ★ 重工回填
      const [pendingRework, setPendingRework] = useState(0); // 待回填重工數
      const [showReworkRefillModal, setShowReworkRefillModal] = useState(false);
      const [reworkRefillGood, setReworkRefillGood] = useState('');
      const [reworkRefillBad, setReworkRefillBad] = useState('');
      const [reworkIds, setReworkIds] = useState([]);
      // ★ 重工登記小視窗
      const [showReworkEntryModal, setShowReworkEntryModal] = useState(false);
      const [reworkEntryQty, setReworkEntryQty] = useState('1');
      const [reworkEntryLocations, setReworkEntryLocations] = useState([]);
      const [reworkEntryNote, setReworkEntryNote] = useState('');
      
      const [faiCount, setFaiCount] = useState(0);
      const [batchFaiCount, setBatchFaiCount] = useState(0);
      
      const [cumulativeFaiCount, setCumulativeFaiCount] = useState(0); 
      const [cumulativeIncomingInner, setCumulativeIncomingInner] = useState(0);
      const [cumulativeIncomingOuter, setCumulativeIncomingOuter] = useState(0);

      const [defectDetails, setDefectDetails] = useState({});
      const [fleshyCount, setFleshyCount] = useState(0);
      const [showFleshyModal, setShowFleshyModal] = useState(false); // ★ 多肉回填 Modal
      const [fleshyGood, setFleshyGood]     = useState(''); // 加工成功良品數
      const [fleshyBad, setFleshyBad]       = useState(''); // 加工後不良數
      const [fleshyWrong, setFleshyWrong]   = useState(''); // 誤判數（計回良品）
      const [pendingDetails, setPendingDetails] = useState({});
      const [newPendingName, setNewPendingName] = useState('');
      const [pendingTargets, setPendingTargets] = useState({});

      const [incomingInnerDefect, setIncomingInnerDefect] = useState(0);
      const [incomingOuterDefect, setIncomingOuterDefect] = useState(0);

      const [initialInner, setInitialInner] = useState(0);
      const [initialOuter, setInitialOuter] = useState(0);

      // 發料差異（短發為負數，多發為正數）
      const [innerDiff, setInnerDiff] = useState(0);  // 內層差異
      const [outerDiff, setOuterDiff] = useState(0);  // 外層差異

      // ★ 狀態計時系統（取代機台稼動程式，無網路環境暫時方案）
      // 各狀態累計秒數：當班結算或結批時清零，用於計算稼動率/調機時長
      const [statusDurations, setStatusDurations] = useState({
        running: 0, setup_lc: 0, setup_fb: 0, setup_sb: 0, error: 0, idle: 0,
      });
      const [statusStartTime, setStatusStartTime] = useState(() => Date.now()); // 目前狀態從何時開始計時
      const [pauseReasonLog, setPauseReasonLog] = useState([]); // 異常暫停的具體原因清單（含時長）
      const [showMaterialDiffModal, setShowMaterialDiffModal] = useState(false);
      const [tempInnerDiff, setTempInnerDiff] = useState('');
      const [tempOuterDiff, setTempOuterDiff] = useState('');

      // ★ 送外待判（跨天，存到 Sheets，所有線可查）
      const [showSendOutModal, setShowSendOutModal] = useState(false);
      const [sendOutQty, setSendOutQty] = useState('');
      const [sendOutSamplerName, setSendOutSamplerName] = useState(''); // ★ 領走人姓名
      const [sendOutSampledQty, setSendOutSampledQty] = useState('');   // ★ 領走數量
      const [shiftTakenOutLog, setShiftTakenOutLog] = useState([]);     // ★ 本班送外待判領走記錄 [{name, qty}]
      const [sendOutReason, setSendOutReason] = useState('');
      const [sendOutDate, setSendOutDate] = useState(() => new Date().toISOString().slice(0,10));

      // ★ 領用不良品（已確定不良，只記錄去向，不影響任何計數）
      const [showPickupModal, setShowPickupModal] = useState(false);
      const [pickupName, setPickupName] = useState('');
      const [pickupQty, setPickupQty] = useState('');
      const [pickupReason, setPickupReason] = useState('');
      const [pickupLog, setPickupLog] = useState([]);

      // ★ 跨班多肉追蹤
      const [inheritedFleshy, setInheritedFleshy] = useState([]); // 後端載入的待回填多肉清單
      const [showFleshyGuide, setShowFleshyGuide] = useState(false); // 登入後引導畫面
      const [fleshyResolveForm, setFleshyResolveForm] = useState({}); // {fleshyId: {good,bad,wrong}}
      const [showPendingQueryModal, setShowPendingQueryModal] = useState(false);
      const [pendingQueryList, setPendingQueryList] = useState([]);
      const [pendingQueryLoading, setPendingQueryLoading] = useState(false);
      const [pendingQueryFilter, setPendingQueryFilter] = useState('待判中');
      const [resolvingItem, setResolvingItem] = useState(null); // 正在回填結果的項目
      // ★ 拆分回填表單：[{ result: '良品'|不良分類, qty: N }, ...]
      const [resolveRows, setResolveRows] = useState([]);
      // ★ 新版回填：兩個數字框
      const [panelResolveGoodQty, setPanelResolveGoodQty] = useState('');
      const [panelResolveBadQty, setPanelResolveBadQty] = useState('');
      const [panelResolveBadReason, setPanelResolveBadReason] = useState('');
      const [sampledQtyInput, setSampledQtyInput] = useState(''); // QC抽樣送驗數量輸入
      const [samplerNameInput, setSamplerNameInput] = useState(''); // ★ 抽樣人員姓名輸入

      // ★ 主管分配批次：自動讀取該線目前批次
      const [currentBatch, setCurrentBatch] = useState(null);
      const [batchLoading, setBatchLoading] = useState(false);
      const [currentBatchId, setCurrentBatchId] = useState(null); // 用於下班結算時更新批次
      const [showNextBatchConfirm, setShowNextBatchConfirm] = useState(null); // 結批後自動接續的下一批資訊（需作業員確認）
      const [isIdleMode, setIsIdleMode] = useState(false); // ★ 閒置等待模式：這條線目前沒有批次，但仍可走交接班流程

      // ★ 作業員名單：從 Sheets「系統設定」動態讀取
      const [operatorsList, setOperatorsList] = useState([]); // [{name, shift}]
      const [operatorsLoading, setOperatorsLoading] = useState(true);
      const [showAllOperators, setShowAllOperators] = useState(false); // ★ 顯示全部人員開關

      // 3. 機台狀態與 Modal 狀態
      const [status, setStatus] = useState('running'); 
      const [pauseReasons, setPauseReasons] = useState(['缺料等待', '機台維修', '模具更換']);
      const [currentPauseReason, setCurrentPauseReason] = useState('');
      const [newPauseInput, setNewPauseInput] = useState('');
      
      const [showPauseModal, setShowPauseModal] = useState(false);
      const [showDefectModal, setShowDefectModal] = useState(false);
      const [showPendingModal, setShowPendingModal] = useState(false);
      const [showReworkModal, setShowReworkModal] = useState(false); // 重工明細彈窗
      const [showMaterialModal, setShowMaterialModal] = useState(false); // 領料登記視窗改裝為：物料餘量與自動盤點對帳
      const [showIncomingDefectModal, setShowIncomingDefectModal] = useState(false); // 來料不良視窗
      const [showFaiModal, setShowFaiModal] = useState(false); // 首件確認視窗
      
      // 下班與接班 Login Modal
      const [showHandoverModal, setShowHandoverModal] = useState(false);
      const [showLoginModal, setShowLoginModal] = useState(false);

      const [nextShiftStaff, setNextShiftStaff] = useState({ assembler: '', machineOp: '', inspector: '', workerCount: '', line: '' });
      
      // 下班時同時結批
      const [handoverWithBatchClose, setHandoverWithBatchClose] = useState(false);
      const [showBatchCloseConfirm, setShowBatchCloseConfirm] = useState(false); // ★ 結批二次確認

      // FAI 首件確認勾選單狀態
      const [faiChecklist, setFaiChecklist] = useState({
        weldCheck: false,
        sizeCheck: false,
        feelCheck: false,
        waterTest: '', // ★ 進水測試結果：''=未選擇 / 'pass'=通過 / 'fail'=不通過（不影響能否送出首件）
      });

      // 4. 系統狀態與自訂 Toast 防呆警示
      const [currentTime, setCurrentTime] = useState(new Date());
      const [handoverNote, setHandoverNote] = useState(''); 
      const [customReasonInput, setCustomReasonInput] = useState(''); 
      const [editingLogId, setEditingLogId] = useState(null);
      const [editingText, setEditingText] = useState('');
      const [toastMsg, setToastMsg] = useState('');

      const [handoverLogs, setHandoverLogs] = useState([
        { id: 3, shift: '早班', shiftStyle: 'bg-amber-500/20 text-amber-400 border-amber-500/30', time: '08:10', operator: '張大飛', text: '✅ [首件確認] 早班開班首件檢驗合格，檢驗項目（熔接、外觀、對位手感）皆符合標準書規範，首件已移至首件專用架。' },
        { id: 2, shift: '早班', shiftStyle: 'bg-amber-500/20 text-amber-400 border-amber-500/30', time: '15:45', operator: '林小明', text: '機台參數已微調，目前良率穩定。' },
        { id: 1, shift: '夜班', shiftStyle: 'bg-blue-500/20 text-blue-400 border-blue-500/30', time: '07:50', operator: '陳建宏', text: 'M4螺絲快用完了，已通知倉管補料。' }
      ]);

      // 觸發自訂警告 Toast
      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(''), 3000);
      };

      // ★ localStorage 自動存檔（防止誤觸重整遺失資料）
      const LS_KEY = 'welding_panel_state';
      useEffect(() => {
        // 只在生產中才存檔
        if (appScreen !== 'production') return;
        const snapshot = {
          appScreen, lineInfo, shiftStartTime: shiftStartTime ? shiftStartTime.toISOString() : null,
          goodCount, reworkDetails, faiCount, batchFaiCount,
          defectDetails, fleshyCount, pendingDetails,
          incomingInnerDefect, incomingOuterDefect,
          initialInner, initialOuter, innerDiff, outerDiff,
          statusDurations, status,
          currentBatchId, isIdleMode,
          shiftTakenOutLog, handoverLogs,
          savedAt: Date.now(),
        };
        try { localStorage.setItem(LS_KEY, JSON.stringify(snapshot)); } catch(e) {}
      }, [appScreen, goodCount, reworkDetails, faiCount, defectDetails, pendingDetails,
          incomingInnerDefect, incomingOuterDefect, initialInner, initialOuter,
          statusDurations, status, shiftTakenOutLog]);

      // ★ 頁面載入時嘗試還原（重新整理後自動回到生產畫面）
      useEffect(() => {
        try {
          // ★ 如果剛剛下班，不要還原
          if (sessionStorage.getItem('just_logged_out')) {
            sessionStorage.removeItem('just_logged_out');
            return;
          }
          const raw = localStorage.getItem(LS_KEY);
          if (!raw) return;
          const s = JSON.parse(raw);
          // 超過8小時的存檔不還原（避免隔天開到舊資料）
          if (!s.savedAt || Date.now() - s.savedAt > 8 * 60 * 60 * 1000) {
            localStorage.removeItem(LS_KEY); return;
          }
          if (s.appScreen !== 'production') return;
          // 還原所有狀態
          setLineInfo(s.lineInfo || {});
          setShiftStartTime(s.shiftStartTime ? new Date(s.shiftStartTime) : null);
          setGoodCount(s.goodCount || 0);
          setReworkDetails(s.reworkDetails || {'正面':0,'背面':0,'側邊':0,'底部':0});
          setFaiCount(s.faiCount || 0);
          setBatchFaiCount(s.batchFaiCount || 0);
          setDefectDetails(s.defectDetails || {});
          setFleshyCount(s.fleshyCount || 0);
          setPendingDetails(s.pendingDetails || {});
          setIncomingInnerDefect(s.incomingInnerDefect || 0);
          setIncomingOuterDefect(s.incomingOuterDefect || 0);
          setInitialInner(s.initialInner || 0);
          setInitialOuter(s.initialOuter || 0);
          setInnerDiff(s.innerDiff || 0);
          setOuterDiff(s.outerDiff || 0);
          setStatusDurations(s.statusDurations || {running:0,setup_lc:0,setup_fb:0,setup_sb:0,error:0,idle:0});
          setStatus(s.status || 'running');
          setCurrentBatchId(s.currentBatchId || null);
          setIsIdleMode(s.isIdleMode || false);
          setShiftTakenOutLog(s.shiftTakenOutLog || []);
          if (s.handoverLogs) setHandoverLogs(s.handoverLogs);
          setAppScreen('production');
          // ★ 還原後重新送登入標記，讓 Dashboard 顯示生產中
          setTimeout(() => {
            if (s.lineInfo && s.lineInfo.name) {
              fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ type:'operator_login', line: s.lineInfo.name, assembler: s.lineInfo.assembler || '' })
              }).catch(()=>{});
            }
          }, 2000);
          console.log('✅ 已從本地存檔還原生產資料');
        } catch(e) { console.log('localStorage 還原失敗', e); }
      }, []); // 只在第一次載入執行

      // --- 計算屬性 ---
      const pendingCount = useMemo(() => Object.values(pendingDetails).reduce((sum, val) => sum + val, 0), [pendingDetails]);
      const totalDefect = useMemo(() => Object.values(defectDetails).reduce((sum, count) => sum + count, 0), [defectDetails]);
      const reworkCount = useMemo(() => Object.values(reworkDetails).reduce((sum, val) => sum + val, 0), [reworkDetails]);
      // ★ 投入 = 良品 + 不良 + 待判 + 多肉（全部已加工的）
      const totalInput = goodCount + totalDefect + pendingCount + fleshyCount;
      // ★ 良率 = 良品 ÷ (良品 + 不良)，多肉和待判不計入，回填後才算
      const currentYield = (goodCount + totalDefect) === 0 ? 0 : (goodCount / (goodCount + totalDefect) * 100).toFixed(1);
      // ★ 報工投入 = 良品 + 不良（不含多肉和待判，等回填後才計）
      const reportInput = goodCount + totalDefect + fleshyCount; // ★ 投入含多肉

      // ★ 即時稼動率：累計各狀態秒數 + 目前狀態正在進行的秒數（每秒重新計算，靠 currentTime 觸發重渲染）
      const liveOEE = useMemo(() => {
        const liveElapsed = Math.max(0, Math.round((currentTime.getTime() - statusStartTime) / 1000));
        const durations = { ...statusDurations, [status]: (statusDurations[status] || 0) + liveElapsed };
        const totalSec = Object.values(durations).reduce((a, b) => a + b, 0);
        const runningSec = durations.running || 0;
        return {
          rate: totalSec > 0 ? ((runningSec / totalSec) * 100).toFixed(1) : '0.0',
          runningMin: Math.floor(runningSec / 60),
          setupMin: Math.floor(((durations.setup_lc||0) + (durations.setup_fb||0) + (durations.setup_sb||0)) / 60),
          pauseMin: Math.floor((durations.error || 0) / 60),
          totalMin: Math.floor(totalSec / 60),
        };
      }, [statusDurations, statusStartTime, status, currentTime]);
      
      // 達成率 = (當班投入數量 / 目標數量) * 100%
      const achieveRate = useMemo(() => {
        return lineInfo.target === 0 ? 0 : ((totalInput / lineInfo.target) * 100).toFixed(1);
      }, [totalInput, lineInfo.target]);

      // 累計已被當班消耗的實物料量 (已加工結合數 + 當班累計首件數) 
      const innerMaterialQty = useMemo(() => totalInput + batchFaiCount, [totalInput, batchFaiCount]);
      const outerMaterialQty = useMemo(() => totalInput + batchFaiCount, [totalInput, batchFaiCount]);

      // 🌟 核心防呆公式：剩餘可用線邊素材 = 當班發料量 - 當班結合數 - 當班素材不良 - 當班首件消耗
      const remainingInner = useMemo(() => {
        return Math.max(0, initialInner + innerDiff - totalInput - incomingInnerDefect - batchFaiCount);
      }, [initialInner, innerDiff, totalInput, incomingInnerDefect, batchFaiCount]);

      const remainingOuter = useMemo(() => {
        return Math.max(0, initialOuter + outerDiff - totalInput - incomingOuterDefect - batchFaiCount);
      }, [initialOuter, outerDiff, totalInput, incomingOuterDefect, batchFaiCount]);

      // 物料用盡防呆鎖定狀態 (內層或外層只要有一邊歸零，即阻斷當班增量按鈕)
      const isMaterialExhausted = useMemo(() => {
        return isIdleMode || remainingInner <= 0 || remainingOuter <= 0;
      }, [isIdleMode, remainingInner, remainingOuter]);

      // 賸餘比例計算 (可視化進度條用)
      const innerPercent = useMemo(() => {
        return initialInner > 0 ? Math.min(100, Math.max(0, (remainingInner / initialInner) * 100)) : 0;
      }, [remainingInner, initialInner]);

      const outerPercent = useMemo(() => {
        return initialOuter > 0 ? Math.min(100, Math.max(0, (remainingOuter / initialOuter) * 100)) : 0;
      }, [remainingOuter, initialOuter]);

      const displayReasons = useMemo(() => {
        const custom = Object.keys(defectDetails).filter(k => !INITIAL_DEFECT_REASONS.includes(k) && k !== '其他');
        return [...INITIAL_DEFECT_REASONS.filter(r => r !== '其他'), ...custom, '其他'];
      }, [defectDetails]);

      const shiftInfo = useMemo(() => {
        const h = currentTime.getHours();
        if (h >= 8 && h < 16) return { name: '早班 (08:00 - 16:00)', shortName: '早班', icon: 'fa-sun', color: 'text-amber-400', bg: 'bg-amber-500/20', border: 'border-amber-500/30' };
        if (h >= 16 && h < 24) return { name: '中班 (16:00 - 00:00)', shortName: '中班', icon: 'fa-cloud-moon', color: 'text-indigo-400', bg: 'bg-indigo-500/20', border: 'border-indigo-500/30' };
        return { name: '夜班 (00:00 - 08:00)', shortName: '夜班', icon: 'fa-moon', color: 'text-blue-400', bg: 'bg-blue-500/20', border: 'border-blue-500/30' };
      }, [currentTime]);

      // ★ 依當前班別篩選人員（shiftInfo 定義後才能用）
      const filteredOperators = useMemo(() => {
        const allNames = operatorsList.map(o => typeof o === 'string' ? o : o.name);
        if (showAllOperators || operatorsList.length === 0) return allNames;
        const currentShiftName = shiftInfo.shortName;
        const filtered = operatorsList
          .filter(o => !o.shift || o.shift === currentShiftName)
          .map(o => typeof o === 'string' ? o : o.name);
        return filtered.length > 0 ? filtered : allNames;
      }, [operatorsList, showAllOperators, shiftInfo]);

      const statusDisplay = {
        running:  { label: '生產中',   icon: 'fa-bolt',                                     theme: 'bg-emerald-500/20 border-emerald-500 text-emerald-400' },
        setup_lc: { label: '換線調機', icon: 'fa-shuffle fa-spin',                          theme: 'bg-teal-500/20 border-teal-500 text-teal-400' },
        setup_fb: { label: '正反調機', icon: 'fa-gear fa-spin',                             theme: 'bg-blue-500/20 border-blue-500 text-blue-400' },
        setup_sb: { label: '側底調機', icon: 'fa-screwdriver-wrench text-xs md:text-sm xl:text-base', theme: 'bg-indigo-500/20 border-indigo-500 text-indigo-400' },
        error:    { label: '異常暫停', icon: 'fa-triangle-exclamation fa-fade',              theme: 'bg-red-500/20 border-red-500 text-red-400' },
        idle:     { label: '產線閒置', icon: 'fa-clock',                                     theme: 'bg-slate-600/20 border-slate-500 text-slate-400' }
      };

      // ★ 是否為「停機類」狀態（非生產），用於稼動率計算分類
      const isStopStatus = (s) => s !== 'running';

      // --- 核心防呆扣減驗證閥 ---
      const checkMaterialSufficiency = (qtyNeeded) => {
        if (remainingInner < qtyNeeded || remainingOuter < qtyNeeded) {
          showToast(`⚠️ 剩餘可用素材不足（內層剩: ${remainingInner} / 外層剩: ${remainingOuter}），無法登錄 ${qtyNeeded} 個產品！請換批結案或向線長申請發料。`);
          return false;
        }
        return true;
      };

      // 不良品計數函式 handleDefect
      const handleDefect = (reason, d) => {
        if (status === 'error') {
          showToast('機台異常暫停中，請先排除異常並恢復生產！');
          return;
        }
        // 增量時執行硬防呆驗證
        if (d > 0) {
          if (!checkMaterialSufficiency(d)) return;
        }
        setDefectDetails(p => ({ ...p, [reason]: Math.max(0, (p[reason] || 0) + d) }));
      };

      // 重工累加控制函數
      const handleRework = (location, d) => {
        if (status === 'error') {
          showToast('機台異常暫停中，請先排除異常並恢復生產！');
          return;
        }
        setReworkDetails(p => ({ ...p, [location]: Math.max(0, (p[location] || 0) + d) }));
        // ★ -1 時減少待回填數（+1 由登記小視窗處理）
        if (d < 0) setPendingRework(p => Math.max(0, p - 1));
      };

      // 首件確認提交函式 (FAI)
      const submitFaiConfirm = () => {
        if (!faiChecklist.weldCheck || !faiChecklist.sizeCheck || !faiChecklist.feelCheck) {
          showToast('⚠️ 請先完成所有首件檢驗項目的檢測與勾選！');
          return;
        }
        // 硬防呆驗證
        if (!checkMaterialSufficiency(1)) return;

        setFaiCount(p => p + 1);
        setBatchFaiCount(p => p + 1);
        setCumulativeFaiCount(p => p + 1); // 🌟 跨班總計 +1

        const timestamp = currentTime.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' });
        const waterTestText = faiChecklist.waterTest === 'pass' ? '，進水測試：✅通過'
          : faiChecklist.waterTest === 'fail' ? '，進水測試：❌不通過' : '，進水測試：未測試';
        addLog(`✅ [首件確認] ${shiftInfo.shortName} ${timestamp} 首件確認檢驗合格${waterTestText}。首件樣件已放置至首件專用區，不隨批貨物出庫。`, 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30');

        setFaiChecklist({ weldCheck: false, sizeCheck: false, feelCheck: false, waterTest: '' });
        setShowFaiModal(false);
        showToast('首件確認成功！數據已獨立記錄，素材已自動扣除。');
      };

      // 來料不良增加時，同步寫入跨班累計
      const handleIncomingDefectChange = (type, val) => {
        if (type === 'inner') {
          setIncomingInnerDefect(val);
          // 累加差值到整批
          const diff = val - incomingInnerDefect;
          setCumulativeIncomingInner(p => Math.max(0, p + diff));
        } else {
          setIncomingOuterDefect(val);
          const diff = val - incomingOuterDefect;
          setCumulativeIncomingOuter(p => Math.max(0, p + diff));
        }
      };

      // --- 時鐘定時器 ---
      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      // --- 載入時讀取作業員名單（Sheets「系統設定」分頁）---
      const fetchOperatorsList = () => {
        setOperatorsLoading(true);
        fetch(`${API_URL}?action=config`)
          .then(res => res.json())
          .then(data => {
            if (data.status === 'ok' && data.operators && data.operators.length > 0) {
              // ★ 優先用 operatorsWithShift（含班別），沒有就用 operators（字串陣列）
              const raw = data.operatorsWithShift || data.operators;
              const ops = raw.map(o =>
                typeof o === 'string' ? { name: o, shift: '' } : o
              );
              setOperatorsList(ops);
            }
            setOperatorsLoading(false);
          })
          .catch(() => setOperatorsLoading(false)); // 失敗就維持 FALLBACK_OPERATORS
      };
      useEffect(() => { fetchOperatorsList(); }, []);

      // --- 每30分鐘自動送出報工 ---
      useEffect(() => {
        if (appScreen !== 'production') return;
        const check = () => {
          const m = new Date().getMinutes();
          if (m !== 1 && m !== 31) return; // ★ 整點+1分 或 半點+1分
          const h = new Date().getHours();
          const isHalf = m === 31;
          const period = isHalf
            ? `${String(h).padStart(2,'0')}:00-${String(h).padStart(2,'0')}:30`
            : `${String(h-1<0?23:h-1).padStart(2,'0')}:30-${String(h).padStart(2,'0')}:00`;
          const pendingNote = pendingCount > 0 ? `【注意：尚有${pendingCount}個待判未處理】` : "";
          sendToAPI({ type:"weld_report", line:lineInfo.name, assembler:lineInfo.assembler, machineOp:lineInfo.machineOp, inspector:lineInfo.inspector, model:lineInfo.model, color:lineInfo.color||"", batch:lineInfo.batch, input:reportInput, good:goodCount, defect:totalDefect, rework:reworkCount, defectDetails, incomingInnerDefect, incomingOuterDefect, faiCount, fleshyCount, note:"每30分鐘自動回報"+pendingNote, period });
        };
        const t = setInterval(check, 60000);
        return () => clearInterval(t);
      }, [appScreen, lineInfo, goodCount, totalInput, totalDefect, reworkCount, defectDetails, incomingInnerDefect, incomingOuterDefect, faiCount]);

      // --- 每30分鐘自動送出稼動紀錄 ---
      const machineLogRef = React.useRef({});
      React.useEffect(() => {
        machineLogRef.current = { liveOEE, lineInfo, totalInput, reworkCount, pauseReasonLog };
      });
      useEffect(() => {
        if (appScreen !== 'production') return;
        const check = () => {
          const m = new Date().getMinutes();
          console.log('[稼動檢查] 分鐘:', m);
          if (m !== 1 && m !== 31) return;
          const { liveOEE: oee, lineInfo: li, totalInput: ti, reworkCount: rc, pauseReasonLog: prl } = machineLogRef.current;
          console.log('[稼動送出] line:', li?.name, 'activeMin:', oee?.runningMin);
          sendToAPIWithResponse({
            type: 'machine_log',
            line: li.name,
            activeMinutes: oee.runningMin,
            tuneMinutes:   oee.setupMin,
            pauseMinutes:  oee.pauseMin,
            idleMinutes:   0,
            inputCount:    ti,
            reworkCount:   rc,
            pauseHistory:  (prl||[]).slice(-10).map(r=>({reason:r.reason})),
            tuneHistory:   [],
            note: '每30分鐘自動回報',
          }).then(res => console.log('[稼動回傳]', res));
        };
        const t = setInterval(check, 60000);
        return () => clearInterval(t);
      }, [appScreen]); // ★ 只依賴 appScreen，不依賴頻繁更新的狀態

      // --- 核心日誌函數 ---
      const addLog = (text, customStyle = null) => {
        const newLog = {
          id: Date.now(),
          shift: shiftInfo.shortName,
          shiftStyle: customStyle || `${shiftInfo.bg} ${shiftInfo.color} ${shiftInfo.border}`,
          time: currentTime.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' }),
          operator: lineInfo.machineOp.split(' ')[0], 
          text: text
        };
        setHandoverLogs(prev => [newLog, ...prev]);
      };

      const handleSaveNote = () => {
        if (!handoverNote.trim()) return;
        addLog(handoverNote);
        setHandoverNote(''); 
      };

      const handleGood = (d) => {
        if (status === 'error') {
          showToast('機台異常暫停中，請先排除異常並恢復生產！');
          return;
        }
        // 增量時執行硬防呆驗證
        if (d > 0) {
          if (!checkMaterialSufficiency(d)) return;
        }
        setGoodCount(p => Math.max(0, p + d));
      };

      // ★ 結算目前狀態經過的秒數，累加進 statusDurations，並重置計時起點
      //   回傳結算後的完整 durations 物件，供呼叫端立即同步使用（state更新是非同步的，不能馬上讀舊的state）
      const settleCurrentStatusDuration = () => {
        const now = Date.now();
        const elapsedSec = Math.round((now - statusStartTime) / 1000);
        const newDurations = {
          ...statusDurations,
          [status]: (statusDurations[status] || 0) + Math.max(0, elapsedSec),
        };
        setStatusDurations(newDurations);
        setStatusStartTime(now);
        return newDurations; // ★ 同步回傳，呼叫端應該用這個回傳值，不要讀 statusDurations state
      };

      const handleStatusChange = (newStatus) => {
        if (newStatus === 'error') {
          setShowPauseModal(true);
        } else {
          const oldLabel = statusDisplay[status].label;
          const settledDurations = settleCurrentStatusDuration();
          const elapsedSec = settledDurations[status] - (statusDurations[status] || 0);
          setStatus(newStatus);
          setCurrentPauseReason('');
          if (status !== newStatus) {
            const minutesText = elapsedSec >= 60 ? `${Math.floor(elapsedSec/60)}分${elapsedSec%60}秒` : `${elapsedSec}秒`;
            addLog(`🔄 狀態切換：[${oldLabel}] 持續${minutesText} → 轉為 [${statusDisplay[newStatus].label}]`);
            // ★ 通知後端機台狀態
            sendToAPI({ type: 'machine_status', line: lineInfo.name, machineStatus: newStatus });
          }
        }
      };

      const applyPauseReason = (reason) => {
        const elapsedSec = settleCurrentStatusDuration();
        setStatus('error');
        setCurrentPauseReason(reason);
        setShowPauseModal(false);
        setPauseReasonLog(prev => [...prev, { reason, startTime: Date.now(), endTime: null }]);
        addLog(`⚠️ 異常停機：${reason}`, 'bg-red-500/20 text-red-400 border-red-500/30');
        // ★ 通知後端機台狀態
        sendToAPI({ type: 'machine_status', line: lineInfo.name, machineStatus: 'error' });
      };

      // 🌟 執行下班流程：跨班遞補核心機制
      const executeHandover = () => {
        // 🛡️ 防呆：待判未清零不允許結報
        if (pendingCount > 0) {
          showToast(`⚠️ 還有 ${pendingCount} 個待判品未處理！`);
          return;
        }

        // ★ 先結算目前狀態的計時，確保最後一段時間也被算進去（取得結算後的最終數值）
        const finalDurations = settleCurrentStatusDuration();

        const batchStatusText = handoverWithBatchClose ? "結報並結批" : "結報";
        if (!isIdleMode) {
          const shiftEndTime = new Date();
          sendToAPI({ type:"weld_report", line:lineInfo.name, assembler:lineInfo.assembler, machineOp:lineInfo.machineOp, inspector:lineInfo.inspector, model:lineInfo.model, color:lineInfo.color||"", batch:lineInfo.batch, input:reportInput, good:goodCount, defect:totalDefect, rework:reworkCount, defectDetails, incomingInnerDefect, incomingOuterDefect, faiCount, fleshyCount, note:`下班結報(${batchStatusText})`, period:"下班結報",
            workerCount: lineInfo.workerCount || '',
            shiftStartTime: shiftStartTime ? shiftStartTime.toISOString() : '',
            shiftEndTime: shiftEndTime.toISOString(),
          });
        }
        addLog(`🚪 [${shiftInfo.shortName}下班${isIdleMode ? '結報(閒置中)' : batchStatusText}] 組裝:${lineInfo.assembler} / 機台:${lineInfo.machineOp} / 檢驗:${lineInfo.inspector}。${isIdleMode ? '本班全程閒置等待批次分配' : `良品:${goodCount}, 製程不良:${totalDefect}, 本班首件:${faiCount}, 內餘:${remainingInner}, 外餘:${remainingOuter}`}`, 'bg-red-950/40 text-red-400 border-red-900/30');

        // ★ 送出本班稼動數據（替代機台稼動程式，暫行方案：作業員自行記錄）
        //   使用 finalDurations（結算後的同步數值），不要用 statusDurations state（會是舊值）
        //   閒置模式：idle 狀態累計的秒數歸入「閒置分鐘」，其他正常分類維持原邏輯
        const tuneSec = (finalDurations.setup_lc||0) + (finalDurations.setup_fb||0) + (finalDurations.setup_sb||0);
        // ★ 限制歷史記錄大小，避免 payload 過大
        const safePauseHistory = (pauseReasonLog||[]).slice(-10).map(r => ({reason: r.reason, startTime: r.startTime}));
        const safeTuneHistory = [
          { type: '換線調機', seconds: finalDurations.setup_lc||0 },
          { type: '正反調機', seconds: finalDurations.setup_fb||0 },
          { type: '側底調機', seconds: finalDurations.setup_sb||0 },
        ].filter(r => r.seconds > 0);
        sendToAPIWithResponse({
          type: "machine_log",
          line: lineInfo.name,
          activeMinutes: Math.round((finalDurations.running||0) / 60 * 10) / 10,
          tuneMinutes:   Math.round(tuneSec / 60 * 10) / 10,
          pauseMinutes:  Math.round((finalDurations.error||0) / 60 * 10) / 10,
          idleMinutes:   Math.round((finalDurations.idle||0) / 60 * 10) / 10,
          inputCount:    totalInput,
          reworkCount:   reworkCount,
          pauseHistory:  safePauseHistory,
          tuneHistory:   safeTuneHistory,
          note: isIdleMode ? "本班全程閒置等待批次分配" : "作業員端記錄（無網路暫行方案）",
        });

        // ★ 更新主管分配的批次餘料（累加本班消耗量），讓下一班能看到正確剩餘
        //   閒置模式下沒有 currentBatchId，這段不會執行
        if (currentBatchId && !isIdleMode) {
          // 本班消耗的內外層數量 = 結合數(totalInput) + 來料不良 + 首件消耗 - 發料差異校正(已內含在remaining算法中)
          // 這裡用「批次原始剩餘 - 本班結算後的remaining」反推本班實際消耗掉的量，最準確
          const innerConsumed = Math.max(0, initialInner - remainingInner);
          const outerConsumed = Math.max(0, initialOuter - remainingOuter);
          sendToAPI({
            type: "batch_deduct",
            batchId: currentBatchId,
            innerDeductDelta: innerConsumed,
            outerDeductDelta: outerConsumed,
            completedDelta: goodCount,
          });

          if (handoverWithBatchClose) {
            // ★ 結批時改用一般 fetch（非 no-cors）以讀取回應，確認是否有自動接續的下一批
            fetch(API_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ type: "batch_close", batchId: currentBatchId, closer: lineInfo.inspector || lineInfo.assembler || '', note: "作業員端結批", pendingFleshyCount: fleshyCount }),
            })
              .then(res => res.json())
              .then(result => {
                if (result.status === 'ok' && result.nextBatch) {
                  setShowNextBatchConfirm(result.nextBatch); // 跳出確認視窗
                }
              })
              .catch(() => {
                // CORS或網路問題時，改用 no-cors 確保至少結批動作有送達
                sendToAPI({ type: "batch_close", batchId: currentBatchId, closer: lineInfo.inspector || lineInfo.assembler || '', note: "作業員端結批(fallback)", pendingFleshyCount: fleshyCount });
              });
          }
        }

        // ★ 重置稼動計時（新班次從零開始累計）
        setStatusDurations({ running: 0, setup_lc: 0, setup_fb: 0, setup_sb: 0, error: 0, idle: 0 });
        setStatusStartTime(Date.now());
        setPauseReasonLog([]);

        setGoodCount(0);
        setReworkDetails({'正面': 0, '背面': 0, '側邊': 0, '底部': 0}); // 重工明細當班清零
        setDefectDetails({});
        setPendingDetails({});
        setFleshyCount(0);
        setFaiCount(0); 
        setBatchFaiCount(0); // 當班首件消耗歸零，不重複扣減下一班的 initialMaterial
        setIncomingInnerDefect(0); // 當班來料不良清零
        setIncomingOuterDefect(0);
        setInnerDiff(0);
        setOuterDiff(0);
        setShiftTakenOutLog([]); // 領走記錄清零
        setPickupLog([]);        // 領用不良品記錄清零
        setPendingRework(0);     // 待回填重工清零
        setReworkIds([]);        // 重工ID清零
        setStatus('running');

        if (handoverWithBatchClose) {
          setInitialInner(0);
          setInitialOuter(0);
          setCumulativeFaiCount(0);
          setCumulativeIncomingInner(0);
          setCumulativeIncomingOuter(0);
          setLineInfo(prev => ({ ...prev, model: '無', batch: '無', target: 0 }));
          setCurrentBatch(null);
          setCurrentBatchId(null);
        } else {
          // 🌟 核心防呆連動：將剩下應做的工單目標及物料剩餘素材，安全繼承給下一班
          setInitialInner(remainingInner);
          setInitialOuter(remainingOuter);
          // cumulativeFaiCount 與 cumulativeIncoming 狀態在背景保留，不作重置，供最後整批盤點
        }

        setShowHandoverModal(false);
        setNextShiftStaff({ assembler: '', machineOp: '', inspector: '', workerCount: '', line: lineInfo.name });
        // ★ 通知後端作業員已下班（Dashboard 清除生產中標記）
        sendToAPI({ type: 'operator_logout', line: lineInfo.name });
        // ★ 下班完成，清除本地存檔並設旗標防止立即還原
        try {
          localStorage.removeItem('welding_panel_state');
          sessionStorage.setItem('just_logged_out', '1'); // ★ 旗標：這次不要還原
        } catch(e) {}
        // 🌟 結算完成 → 回到「開班批次確認」畫面（而非完全重新登入），下一班只需確認人員 + 批次資訊
        setShowLoginModal(true);
      };

      // 執行接班人員登入 → 登入後一律進入換批設定畫面
      const executeShiftLogin = () => {
        const selectedLine = nextShiftStaff.line || lineInfo.name;
        if (!selectedLine) {
          showToast('請先選擇生產線別！');
          return;
        }
        if (!nextShiftStaff.assembler && !nextShiftStaff.machineOp && !nextShiftStaff.inspector) {
          showToast('請至少選擇一位接班人員！');
          return;
        }
        if (!nextShiftStaff.workerCount) {
          showToast('請填寫加工人數！');
          return;
        }
        const finalAssembler = nextShiftStaff.assembler || '無';
        const finalMachineOp = nextShiftStaff.machineOp || '無';
        const finalInspector = nextShiftStaff.inspector || '無';

        setLineInfo(prev => ({
          ...prev,
          name: selectedLine,        // ★ 更新線別（可能換線了）
          assembler: finalAssembler,
          machineOp: finalMachineOp,
          inspector: finalInspector,
          workerCount: nextShiftStaff.workerCount || '',
        }));
        setShiftStartTime(new Date());
        sendToAPI({ type: 'operator_login', line: selectedLine, assembler: finalAssembler, shift: shiftInfo.shortName });
        // ★ 查詢這條線是否有跨班待回填多肉
        fetchInheritedFleshy(selectedLine);
        addLog(`🆕 接班登入（${selectedLine}）：組裝:${finalAssembler} / 機台:${finalMachineOp} / 檢驗:${finalInspector}${nextShiftStaff.workerCount ? ` / 加工人數:${nextShiftStaff.workerCount}` : ''}`, 'bg-emerald-950/40 text-emerald-400 border-emerald-900/30');
        setShowLoginModal(false);
        setHandoverWithBatchClose(false);
        setAppScreen('batch');
        fetchCurrentBatch();
      };

      // ★ 查詢這條線目前進行中的批次（主管在後台分配的）
      const fetchCurrentBatch = () => {
        setBatchLoading(true);
        fetch(`${API_URL}?action=batch_current&line=${encodeURIComponent(lineInfo.name)}`)
          .then(res => res.json())
          .then(data => {
            if (data.status === 'ok' && data.hasBatch) {
              setCurrentBatch(data.batch);
              setCurrentBatchId(data.batch.batchId);
            } else {
              setCurrentBatch(null);
              setCurrentBatchId(null);
            }
            setBatchLoading(false);
          })
          .catch(() => { setBatchLoading(false); setCurrentBatch(null); });
      };

      // ★ 從主管分配的批次開始生產（取代原本手動選型號/顏色/發料量）
      const executeStartFromBatch = () => {
        if (!currentBatch) { showToast('目前沒有可用批次'); return; }
        setIsIdleMode(false);
        setLineInfo(prev => ({
          ...prev,
          model: currentBatch.model,
          color: currentBatch.color,
          batch: currentBatch.batchNo,
          target: currentBatch.target,
        }));
        setInitialInner(currentBatch.innerRemaining);
        setInitialOuter(currentBatch.outerRemaining);
        setGoodCount(0); setDefectDetails({}); setPendingDetails({}); setFleshyCount(0);
        setReworkDetails({'正面': 0, '背面': 0, '側邊': 0, '底部': 0});
        setFaiCount(0); setBatchFaiCount(0);
        setIncomingInnerDefect(0); setIncomingOuterDefect(0);
        setInnerDiff(0); setOuterDiff(0);
        setStatus('running');
        setStatusDurations({ running: 0, setup_lc: 0, setup_fb: 0, setup_sb: 0, error: 0, idle: 0 });
        setStatusStartTime(Date.now());
        addLog(`🆕 開始生產（批次延續）：${currentBatch.model}${currentBatch.color}，內層剩餘:${currentBatch.innerRemaining}, 外層剩餘:${currentBatch.outerRemaining}`, 'bg-blue-500/20 text-blue-400 border-blue-500/30');
        setAppScreen('production');
      };

      // ★ 進入閒置等待模式：沒有批次可生產，但仍可走完整交接班流程，並記錄閒置時間
      const executeEnterIdleMode = () => {
        setIsIdleMode(true);
        setLineInfo(prev => ({ ...prev, model: '閒置中', color: '', batch: '無', target: 0 }));
        setInitialInner(0); setInitialOuter(0);
        setGoodCount(0); setDefectDetails({}); setPendingDetails({}); setFleshyCount(0);
        setReworkDetails({'正面': 0, '背面': 0, '側邊': 0, '底部': 0});
        setFaiCount(0); setBatchFaiCount(0);
        setIncomingInnerDefect(0); setIncomingOuterDefect(0);
        setInnerDiff(0); setOuterDiff(0);
        setStatus('idle'); // ★ 用獨立的 idle 狀態計時，跟生產中/調機/暫停完全分開
        setStatusDurations({ running: 0, setup_lc: 0, setup_fb: 0, setup_sb: 0, error: 0, idle: 0 });
        setStatusStartTime(Date.now());
        addLog(`💤 進入閒置等待模式：${lineInfo.name} 目前沒有分配批次`, 'bg-slate-700/40 text-slate-400 border-slate-600/30');
        setAppScreen('production');
      };

      const handleResolvePending = (cat, target, reason = null) => {
        if (pendingDetails[cat] <= 0) return;
        setPendingDetails(p => ({ ...p, [cat]: p[cat] - 1 }));
        if (target === 'good') setGoodCount(p => p + 1);
        else handleDefect(reason, 1);
      };

      // ★ 待判登記：先計不良，同步登記到 Sheets 待判追蹤
      const executeSendOutPending = () => {
        const totalQty = parseInt(sendOutQty) || 0;
        if (totalQty <= 0) { showToast('請填寫待判數量'); return; }
        if (!sendOutReason.trim()) { showToast('請填寫待判原因'); return; }

        handleDefect('待判中-送外觀察', totalQty);

        sendToAPI({
          type: "pending_register",
          line: lineInfo.name,
          model: lineInfo.model,
          color: lineInfo.color || "",
          batch: lineInfo.batch,
          registrant: lineInfo.inspector || lineInfo.assembler || '',
          qty: totalQty,
          sampledQty: 0,
          samplerName: '',
          reason: sendOutReason.trim(),
          sendOutDate,
          note: `已先計入不良，待後製程確認結果`,
        });

        addLog(`⏳ [待判登記] ${totalQty} pcs，原因：${sendOutReason}，日期：${sendOutDate}`, 'bg-purple-950/40 text-purple-400 border-purple-900/30');
        showToast(`✅ 已登記 ${totalQty} pcs 待判，已先計入不良。`);
        setSendOutQty(''); setSendOutReason('');
        setShowSendOutModal(false);
      };

      // ★ 查詢這條線的跨班待回填多肉
      const fetchInheritedFleshy = (lineName) => {
        fetch(`${API_URL}?action=fleshy_list&line=${encodeURIComponent(lineName)}`)
          .then(r => r.json())
          .then(data => {
            if (data.status === 'ok' && data.items.length > 0) {
              setInheritedFleshy(data.items);
              setShowFleshyGuide(true); // 有多肉才顯示引導
            }
          })
          .catch(() => {});
      };

      // ★ 查詢全線待判清單
      const fetchPendingList = (statusFilter) => {
        setPendingQueryLoading(true);
        fetch(`${API_URL}?action=pending_list${statusFilter ? '&status='+encodeURIComponent(statusFilter) : ''}`)
          .then(res => res.json())
          .then(data => {
            if (data.status === 'ok') setPendingQueryList(data.items || []);
            setPendingQueryLoading(false);
          })
          .catch(() => setPendingQueryLoading(false));
      };

      // ★ 開始回填某一筆：初始化拆分表單（預設一行，數量帶入剩餘數）
      const startResolving = (item) => {
        setResolvingItem(item.pendingId);
        setPanelResolveGoodQty(String(item.remainingQty));
        setPanelResolveBadQty('0');
        setPanelResolveBadReason('');
        setSampledQtyInput(item.sampledQty || '');
        setSamplerNameInput(item.samplerName || '');
      };

      // ★ 登記QC/RD人員抽樣送驗數量與姓名（僅追蹤實物去向，不影響統計計算）
      const executeMarkSampled = (item) => {
        const qty = parseInt(sampledQtyInput) || 0;
        if (qty > 0 && !samplerNameInput.trim()) {
          showToast('⚠️ 請填寫抽樣人員姓名（誰拿走了這些實驗品）');
          return;
        }
        sendToAPI({ type: "pending_mark_sampled", pendingId: item.pendingId, sampledQty: qty, samplerName: samplerNameInput.trim() });
        showToast(`✅ 已記錄：${samplerNameInput} 抽樣送驗 ${qty} 支`);
        setTimeout(() => fetchPendingList(pendingQueryFilter), 800);
      };

      // ★ 回填結果（兩個數字框：轉良品 / 確定不良）
      const executeSplitResolve = (item) => {
        const goodQty = parseInt(panelResolveGoodQty) || 0;
        const badQty  = parseInt(panelResolveBadQty)  || 0;
        const total   = goodQty + badQty;

        if (total <= 0)                      { showToast('請填寫轉良品或確定不良的數量'); return; }
        if (total > item.remainingQty)       { showToast(`⚠️ 合計數量(${total})超過剩餘未結案(${item.remainingQty})`); return; }
        if (badQty > 0 && !panelResolveBadReason) { showToast('有確定不良數量，請選擇不良原因'); return; }

        const resolutions = [];
        if (goodQty > 0) resolutions.push({ result: '良品', qty: goodQty });
        if (badQty  > 0) resolutions.push({ result: panelResolveBadReason, qty: badQty });

        sendToAPI({
          type: "pending_resolve",
          pendingId: item.pendingId,
          resolutions,
          line: item.line, model: item.model, color: item.color, batch: item.batch,
          resolver: lineInfo.inspector || lineInfo.assembler || '',
          note: `回填：轉良品×${goodQty}${badQty > 0 ? `，確定不良×${badQty}(${panelResolveBadReason})` : ''}`,
        });

        showToast(`✅ 已回填：轉良品 ${goodQty}${badQty > 0 ? `，確定不良 ${badQty}` : ''}`);
        setResolvingItem(null);
        setTimeout(() => fetchPendingList(pendingQueryFilter), 800);
      };

      const saveEditLog = () => {
        setHandoverLogs(prev => prev.map(l => l.id === editingLogId ? { ...l, text: editingText } : l));
        setEditingLogId(null); setEditingText('');
      };

      // ── ★ 下一批自動接續確認畫面（結批後優先顯示，蓋過登入畫面）──────
      if (showNextBatchConfirm) {
        const nb = showNextBatchConfirm;
        return (
          <div style={{height:"100dvh"}} className="w-screen bg-slate-950 flex items-center justify-center p-6 text-slate-100 overflow-y-auto">
            <div className="bg-slate-900 border border-amber-500 rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden">
              <div className="bg-amber-600/20 border-b border-amber-500/30 p-6 text-center">
                <i className="fa-solid fa-forward text-4xl text-amber-400 mb-3 block"></i>
                <h1 className="text-2xl font-bold text-amber-400">下一批已自動接續</h1>
                <p className="text-slate-400 text-sm mt-1">本批已結批，系統已自動接上排隊中的下一批，請確認資訊</p>
              </div>
              <div className="p-8 space-y-4">
                <div className="bg-slate-800/50 rounded-2xl p-5 space-y-3">
                  <div className="flex justify-between items-center">
                    <span className="text-slate-400 text-sm">接續型號</span>
                    <span className="text-2xl font-bold text-cyan-300">{nb.model}{nb.color}</span>
                  </div>
                  <div className="flex justify-between items-center">
                    <span className="text-slate-400 text-sm">生產批號</span>
                    <span className="text-lg font-bold text-amber-300">{nb.batchNo}</span>
                  </div>
                  <div className="flex justify-between items-center">
                    <span className="text-slate-400 text-sm">內層發料總量</span>
                    <span className="text-lg font-bold text-cyan-400">{nb.innerTotal} pcs</span>
                  </div>
                  <div className="flex justify-between items-center">
                    <span className="text-slate-400 text-sm">外層發料總量</span>
                    <span className="text-lg font-bold text-amber-400">{nb.outerTotal} pcs</span>
                  </div>
                </div>
                <button
                  onClick={() => { setShowNextBatchConfirm(null); setShowLoginModal(true); }}
                  className="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-5 rounded-2xl text-xl border border-amber-400/50 shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3"
                >
                  <i className="fa-solid fa-check"></i> 確認，繼續交接流程
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ── 接班登入全螢幕畫面 ──────────────────────────────────
      if (appScreen === 'login') {
        return (
          <div style={{height:'100dvh'}} className="w-screen bg-slate-950 flex items-start justify-center p-4 py-6 text-slate-100 overflow-y-auto">
            <div className="bg-slate-900 border border-emerald-500 rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden">
              <div className="bg-emerald-600/20 border-b border-emerald-500/30 p-4 text-center">
                <i className="fa-solid fa-wave-square text-3xl text-emerald-400 mb-2 block"></i>
                <h1 className="text-2xl font-bold text-emerald-400">熔接線報工系統</h1>
                <p className="text-slate-400 text-sm mt-1">請選取接班人員後登入</p>
              </div>
              <div className="p-5 space-y-4">
                {/* 線別選擇 */}
                <div>
                  <label className="block text-emerald-400 text-xs mb-1.5 ml-1 font-bold tracking-wide">生產線別 ★</label>
                  <select
                    value={lineInfo.name}
                    onChange={e => setLineInfo(prev => ({ ...prev, name: e.target.value }))}
                    className="w-full bg-slate-950 border border-emerald-600 rounded-xl p-4 text-xl font-bold outline-none focus:border-emerald-400 transition-all text-emerald-300"
                  >
                    <option value="">-- 請選擇今天的線別 --</option>
                    {['1號線','2號線','3號線','4號線','5號線','6號線','7號線','8號線'].map(l => (
                      <option key={l} value={l}>{l}</option>
                    ))}
                  </select>
                </div>
                {/* 人員選擇 */}
                {operatorsLoading && (
                  <div className="bg-amber-950/30 border border-amber-700/40 rounded-xl p-3 text-amber-300 text-xs flex items-center gap-2">
                    <i className="fa-solid fa-spinner fa-spin"></i>
                    正在載入人員名單，請稍候再選擇...
                    <button onClick={fetchOperatorsList} className="ml-auto text-amber-200 underline">重新載入</button>
                  </div>
                )}
                {!operatorsLoading && operatorsList.length === 0 && (
                  <div className="bg-red-950/30 border border-red-700/40 rounded-xl p-3 text-red-300 text-xs flex items-center gap-2">
                    <i className="fa-solid fa-triangle-exclamation"></i>
                    人員名單載入失敗，請檢查網路後重試
                    <button onClick={fetchOperatorsList} className="ml-auto text-red-200 underline">重試</button>
                  </div>
                )}

                {/* ★ 班別篩選提示 + 顯示全部按鈕 */}
                {operatorsList.length > 0 && (
                  <div className="flex items-center justify-between bg-slate-800/50 rounded-xl px-3 py-2">
                    <span className="text-slate-500 text-xs">
                      <i className="fa-solid fa-filter mr-1"></i>
                      顯示 {showAllOperators ? '全部' : shiftInfo.shortName} 人員（{filteredOperators.length} 人）
                    </span>
                    <button onClick={() => setShowAllOperators(p => !p)}
                      className={`text-xs font-bold px-3 py-1 rounded-lg transition-all ${
                        showAllOperators ? 'bg-amber-600 text-white' : 'bg-slate-700 text-slate-400 hover:text-white'
                      }`}>
                      {showAllOperators ? '收回篩選' : '顯示全部人員'}
                    </button>
                  </div>
                )}

                {[
                  { label: '組裝作業員', key: 'assembler' },
                  { label: '機台操作員', key: 'machineOp' },
                  { label: '產品檢驗員 (QC)', key: 'inspector' },
                ].map(({ label, key }) => (
                  <div key={key}>
                    <label className="block text-slate-400 text-xs mb-1.5 ml-1 font-bold">{label}</label>
                    <select
                      value={nextShiftStaff[key]}
                      onChange={e => setNextShiftStaff(prev => ({ ...prev, [key]: e.target.value }))}
                      className="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-xl font-bold outline-none focus:border-emerald-500 transition-all text-slate-100"
                    >
                      <option value="">無 (無此崗位/免填)</option>
                      {filteredOperators.map(name => (
                        <option key={name} value={name} className="bg-slate-900">{name}</option>
                      ))}
                    </select>
                  </div>
                ))}

                {/* ★ 加工人數 */}
                <div>
                  <label className="block text-slate-400 text-xs mb-1.5 ml-1 font-bold">
                    加工人數 <span className="text-red-400 font-normal text-xs">（必填）</span>
                  </label>
                  <input
                    type="number" min="1" max="20"
                    value={nextShiftStaff.workerCount}
                    onChange={e => setNextShiftStaff(prev => ({ ...prev, workerCount: e.target.value }))}
                    placeholder="3"
                    className="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-xl font-bold outline-none focus:border-emerald-500 transition-all text-slate-100"
                  />
                </div>

                <button
                  onClick={executeShiftLogin}
                  className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-5 rounded-2xl text-2xl border border-emerald-400/50 shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3 mt-2"
                >
                  <i className="fa-solid fa-circle-user"></i> 確認登入接班
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ── 換批設定全螢幕畫面 ──────────────────────────────────
      if (appScreen === 'batch') {
        return (
          <div style={{height:"100dvh"}} className="w-screen bg-slate-950 flex items-center justify-center p-4 text-slate-100 overflow-y-auto">
            <div className="bg-slate-900 border border-blue-500 rounded-3xl w-full max-w-xl shadow-2xl overflow-hidden">
              <div className="bg-blue-600/20 border-b border-blue-500/30 p-5 flex items-center gap-3">
                <i className="fa-solid fa-arrows-rotate text-blue-400 text-2xl"></i>
                <div className="flex-1">
                  <h2 className="text-2xl font-bold text-blue-400">開班批次確認</h2>
                  <p className="text-slate-400 text-xs mt-0.5">
                    人員：{lineInfo.assembler || '無'} / {lineInfo.machineOp || '無'} / {lineInfo.inspector || '無'} ・ {lineInfo.name}
                  </p>
                </div>
                <button onClick={() => {
                  try { localStorage.removeItem('welding_panel_state'); sessionStorage.setItem('just_logged_out','1'); } catch(e){}
                  sendToAPI({ type: 'operator_logout', line: lineInfo.name });
                  setAppScreen('login');
                }} className="text-slate-500 hover:text-slate-300 text-sm flex items-center gap-1.5 px-3 py-2 rounded-xl hover:bg-slate-800 transition-all">
                  <i className="fa-solid fa-arrow-left"></i> 返回
                </button>
              </div>

              <div className="p-6 space-y-5">
                {batchLoading && (
                  <div className="text-center py-12 text-slate-500">
                    <i className="fa-solid fa-spinner fa-spin text-3xl mb-3 block"></i>
                    正在查詢 {lineInfo.name} 目前批次...
                  </div>
                )}

                {!batchLoading && !currentBatch && (
                  <div className="text-center py-10 space-y-4">

                              else showToast('⚠️ 剩餘可用素材不足，無法登記更多來料不良！');
                            }} 
                            className="h-10 bg-pink-600/10 hover:bg-pink-600/20 rounded-lg text-xs font-bold text-pink-400 border border-pink-500/20"
                          >
                            + 10
                          </button>
                          <button 
                            type="button" 
                            onClick={() => {
                              const targetAdd = Math.min(50, remainingOuter);
                              if (targetAdd > 0) handleIncomingDefectChange('outer', incomingOuterDefect + targetAdd);
                              else showToast('⚠️ 剩餘可用素材不足，無法登記更多來料不良！');
                            }} 
                            className="h-10 bg-pink-600 hover:bg-pink-500 text-white rounded-lg text-xs font-bold transition-all active:scale-95 flex items-center justify-center gap-1"
                          >
                            + 50
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>

                </div>

                {/* 彈窗底部 */}
                <div className="p-4 bg-slate-900 border-t border-slate-800 shrink-0 flex gap-4">
                  <button type="button" onClick={() => setShowIncomingDefectModal(false)} className="flex-1 py-3.5 bg-slate-850 hover:bg-slate-800 rounded-xl font-bold text-base text-slate-300 transition-colors">取消</button>
                  <button 
                    type="button" 
                    onClick={() => {
                      addLog(`📦 [來料不良登記] 當班內層來料不良: ${incomingInnerDefect} pcs / 外層: ${incomingOuterDefect} pcs (整批累計: 內 ${cumulativeIncomingInner} / 外 ${cumulativeIncomingOuter} )`, 'bg-pink-950/40 text-pink-400 border-pink-900/30');
                      setShowIncomingDefectModal(false);
                      showToast('來料不良登記成功！已重新計算剩餘可用數量。');
                    }} 
                    className="flex-1 bg-pink-600 hover:bg-pink-500 text-white font-bold py-3.5 rounded-xl text-base shadow-lg active:scale-95 transition-all"
                  >
                    確認登記並送出
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* 🌟 E. 首件確認 (FAI) Modal (獨立首件數據，增量防呆驗證) */}
          {showFaiModal && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[140] p-6 text-center">
              <div className="bg-slate-900 border border-emerald-500 rounded-3xl w-full max-w-xl flex flex-col animate-[bounce_0.2s_ease-out] shadow-2xl overflow-hidden max-h-[95vh]">
                
                {/* 彈窗 Header */}
                <div className="bg-emerald-600/20 border-b border-emerald-500/30 p-5 flex justify-between items-center shrink-0">
                  <h3 className="text-2xl font-bold text-emerald-400 flex items-center gap-3">
                    <i className="fa-solid fa-shield-halved"></i> 班前 / 休息後首件確認 (FAI)
                  </h3>
                  <button onClick={() => {
                    setFaiChecklist({ weldCheck: false, sizeCheck: false, feelCheck: false, waterTest: '' });
                    setShowFaiModal(false);
                  }} className="flex items-center gap-1.5 text-slate-400 hover:text-white text-sm font-bold px-3 py-2 rounded-xl hover:bg-slate-800 transition-all"><i className="fa-solid fa-arrow-left"></i> 返回</button>
                </div>

                {/* 彈窗 Body */}
                <div className="p-6 md:p-8 space-y-5 text-left overflow-y-auto no-scrollbar">
                  <div className="bg-emerald-500/10 p-4 rounded-xl border border-emerald-500/20">
                    <p className="text-slate-300 text-xs md:text-sm leading-relaxed">
                      💡 <strong>首件規章：</strong>依據製造標準書規定，每日開班前、休息時間回來重新生產時，皆必須製作並確認「首件」。首件確認合格後將移至實體<strong>「首件專用區」</strong>，不隨批貨物出庫。
                    </p>
                  </div>

                  {/* SOP 勾選檢驗項目 */}
                  <div className="space-y-3 bg-slate-950/60 p-5 rounded-2xl border border-slate-800">
                    <h4 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2 border-b border-slate-800 pb-1">
                      <i className="fa-solid fa-list-check text-emerald-400 mr-2"></i> 首件標準檢驗清單 (Checklist)
                    </h4>
                    
                    <label className="flex items-start gap-3 p-2.5 rounded-lg hover:bg-slate-900/60 transition-colors cursor-pointer group">
                      <input 
                        type="checkbox" 
                        checked={faiChecklist.weldCheck} 
                        onChange={(e) => setFaiChecklist({...faiChecklist, weldCheck: e.target.checked})}
                        className="w-5 h-5 accent-emerald-500 rounded cursor-pointer mt-0.5 shrink-0" 
                      />
                      <div className="text-xs md:text-sm">
                        <span className="font-bold text-slate-200 group-hover:text-emerald-400 transition-colors">1. 熔接外觀檢驗良好</span>
                        <p className="text-slate-500 text-[11px] mt-0.5">無虛焊、過焊、偏位，焊點飽滿對稱。</p>
                      </div>
                    </label>

                    <label className="flex items-start gap-3 p-2.5 rounded-lg hover:bg-slate-900/60 transition-colors cursor-pointer group">
                      <input 
                        type="checkbox" 
                        checked={faiChecklist.sizeCheck} 
                        onChange={(e) => setFaiChecklist({...faiChecklist, sizeCheck: e.target.checked})}
                        className="w-5 h-5 accent-emerald-500 rounded cursor-pointer mt-0.5 shrink-0" 
                      />
                      <div className="text-xs md:text-sm">
                        <span className="font-bold text-slate-200 group-hover:text-emerald-400 transition-colors">2. 尺寸與間隙量測合格</span>
                        <p className="text-slate-500 text-[11px] mt-0.5">使用卡尺/塞規量測關鍵合規尺寸符合標準書。</p>
                      </div>
                    </label>

                    <label className="flex items-start gap-3 p-2.5 rounded-lg hover:bg-slate-900/60 transition-colors cursor-pointer group">
                      <input 
                        type="checkbox" 
                        checked={faiChecklist.feelCheck} 
                        onChange={(e) => setFaiChecklist({...faiChecklist, feelCheck: e.target.checked})}
                        className="w-5 h-5 accent-emerald-500 rounded cursor-pointer mt-0.5 shrink-0" 
                      />
                      <div className="text-xs md:text-sm">
                        <span className="font-bold text-slate-200 group-hover:text-emerald-400 transition-colors">3. 按鈕與對位手感正常</span>
                        <p className="text-slate-500 text-[11px] mt-0.5">按鈕彈性良好、回彈迅速且相機按鍵手感無偏移。</p>
                      </div>
                    </label>

                    <div className="flex items-center justify-between gap-3 p-2.5 rounded-lg hover:bg-slate-900/60 transition-colors">
                      <div className="text-xs md:text-sm flex-1">
                        <span className="font-bold text-slate-200">4. 進水測試結果（選填，不影響送出）</span>
                        <p className="text-slate-500 text-[11px] mt-0.5">依標準書規定進行防水測試，紀錄測試結果。</p>
                      </div>
                      <select value={faiChecklist.waterTest}
                        onChange={(e) => setFaiChecklist({...faiChecklist, waterTest: e.target.value})}
                        className={`shrink-0 rounded-lg px-3 py-2 text-xs font-bold outline-none border ${
                          faiChecklist.waterTest === 'pass' ? 'bg-emerald-950/40 border-emerald-600 text-emerald-300' :
                          faiChecklist.waterTest === 'fail' ? 'bg-red-950/40 border-red-600 text-red-300' :
                          'bg-slate-900 border-slate-700 text-slate-400'
                        }`}
                      >
                        <option value="">尚未測試</option>
                        <option value="pass">✅ 通過</option>
                        <option value="fail">❌ 不通過</option>
                      </select>
                    </div>
                  </div>

                  {/* 盤點提示與公式對齊 */}
                  <div className="text-xs text-slate-400 leading-normal bg-slate-900/40 p-4 rounded-xl border border-slate-800">
                    <span className="text-cyan-400 font-bold block mb-1.5"><i className="fa-solid fa-circle-info"></i> 精確對帳盤點模式指引：</span>
                    送出首件合格後，系統會自動累計「本班首件數 +1」與「本批累計首件數 +1」。
                    <br />
                    <span className="text-slate-500 text-[10px] mt-1 block">
                      ※ <strong>注意：</strong>首件消耗已獨立計帳，此處不會自動累加已領料數量，避免雙重扣減。結批對帳時，請依據公式核對：
                      <strong className="text-slate-300 block mt-1">發料總數 = 加工良品數 + 不良數 + 待判數 + 本批累計首件數 + 線邊剩餘可用量</strong>
                    </span>
                  </div>

                  {/* 按鍵動作區 */}
                  <div className="flex gap-4 pt-2">
                    <button 
                      type="button" 
                      onClick={() => {
                        setFaiChecklist({ weldCheck: false, sizeCheck: false, feelCheck: false, waterTest: '' });
                        setShowFaiModal(false);
                      }} 
                      className="flex-1 py-4 bg-slate-850 hover:bg-slate-800 rounded-xl font-bold text-base text-slate-300 transition-colors"
                    >
                      取消
                    </button>
                    <button 
                      type="button" 
                      onClick={submitFaiConfirm} 
                      disabled={!faiChecklist.weldCheck || !faiChecklist.sizeCheck || !faiChecklist.feelCheck || isMaterialExhausted}
                      className={`flex-1 font-bold py-4 rounded-xl text-base shadow-lg transition-all flex items-center justify-center gap-2 ${
                        faiChecklist.weldCheck && faiChecklist.sizeCheck && faiChecklist.feelCheck && !isMaterialExhausted
                          ? 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-emerald-500/20 active:scale-95' 
                          : 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700/60'
                      }`}
                    >
                      <i className="fa-solid fa-circle-check"></i> {isMaterialExhausted ? '素材不足已鎖定' : '確認首件合格，送出'}
                    </button>
                  </div>

                </div>

              </div>
            </div>
          )}

          {/* 🌟 F. 重工明細 Modal */}
          {showReworkModal && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[130] p-4 text-center">
              <div className="bg-slate-900 border border-orange-500/40 rounded-3xl w-full max-w-4xl shadow-2xl flex flex-col max-h-[95vh] overflow-hidden animate-[bounce_0.2s_ease-out]">
                <div className="bg-orange-600/15 border-b border-orange-500/20 p-4 flex justify-between items-center shrink-0">
                  <div className="flex items-center gap-4 text-left">
                    <h3 className="text-xl md:text-2xl font-bold text-orange-400 flex items-center gap-2">
                      <i className="fa-solid fa-rotate"></i> 重工明細管理
                    </h3>
                    <span className="bg-orange-500/20 border border-orange-500/40 text-orange-300 px-3 py-1 rounded-lg text-sm md:text-base font-bold font-mono">
                      總重工: {reworkCount}
                    </span>
                  </div>
                  <button onClick={() => setShowReworkModal(false)} className="flex items-center gap-1.5 text-slate-400 hover:text-white text-sm font-bold px-3 py-2 rounded-xl hover:bg-slate-800 transition-all"><i className="fa-solid fa-arrow-left"></i> 返回</button>
                </div>

                <div className="flex-1 overflow-y-auto p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 bg-slate-950/30 no-scrollbar text-left">
                  {['正面', '背面', '側邊', '底部'].map(location => (
                    <div key={location} className="bg-slate-800/85 border border-slate-700/60 rounded-2xl p-4 flex flex-col items-center justify-between gap-4 shadow-md transition-colors hover:bg-slate-800/100 min-h-[7rem]">
                      <span className="text-slate-200 text-lg font-bold flex-1 leading-tight break-words pr-1">
                        {location}重工
                      </span>
                      <div className="flex items-center justify-between w-full bg-slate-950 p-2 rounded-xl border border-slate-600 shadow-inner">
                        <button onClick={() => handleRework(location, -1)} className="w-10 h-10 rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-white text-xl font-bold flex items-center justify-center">-</button>
                        <span className="text-2xl font-mono font-bold text-orange-400 w-12 text-center">{reworkDetails[location] || 0}</span>
                        <button onClick={() => {
                          setReworkEntryLocations([location]);
                          setReworkEntryQty('1');
                          setReworkEntryNote('');
                          setShowReworkEntryModal(true);
                        }} className="w-10 h-10 rounded-lg bg-orange-600 text-white hover:bg-orange-500 text-xl font-bold border border-orange-400/20 shadow flex items-center justify-center">+</button>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="p-4 border-t border-slate-800 bg-slate-900 flex justify-end shrink-0">
                  <button onClick={() => setShowReworkModal(false)} className="px-10 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold text-white text-base active:scale-95 transition-all shadow-md">
                    完成並關閉
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
