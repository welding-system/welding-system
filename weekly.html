
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熔接線週報彙整</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: #060b18; }
  ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:#334155; border-radius:4px; }
  .num { font-family: 'SF Mono','Consolas',monospace; font-variant-numeric: tabular-nums; }
  .card { transition: all 0.2s; cursor: pointer; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
</style>
</head>
<body class="text-slate-100 min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const API_URL = "https://script.google.com/macros/s/AKfycbxITB84zMMmsoA85EysG_OnOdW8U7yoCLihJlCE-SRC4FX_9Y1JfOdET7fLp9ga0yUUQw/exec";
const LINES = ['1號線','2號線','3號線','4號線','5號線','6號線','7號線','8號線'];
const LINE_COLORS = ['#34d399','#60a5fa','#f59e0b','#f472b6','#a78bfa','#22d3ee','#fb923c','#86efac'];
const DEFECT_LABELS = ["熔接不良(正)","熔接不良(反)","熔接不良(側)","熔接不良(底)","損傷","組裝不良","機台操作不當","髒污","按鈕對位","相機鍵異常","異色點","鏟傷多肉","其他"];

function getLastWeekRange() {
  const now = new Date(), dow = now.getDay(), dm = dow===0?6:dow-1;
  const thisMonday = new Date(now); thisMonday.setDate(now.getDate()-dm); thisMonday.setHours(0,0,0,0);
  const lastMonday = new Date(thisMonday); lastMonday.setDate(thisMonday.getDate()-7);
  const lastSunday = new Date(thisMonday); lastSunday.setDate(thisMonday.getDate()-1);
  return { from: lastMonday.toISOString().slice(0,10), to: lastSunday.toISOString().slice(0,10) };
}

function yieldColor(y) {
  if (y >= 90) return '#10b981';
  if (y >= 80) return '#f59e0b';
  return '#ef4444';
}

function calcLine(weldRows, machRows, target) {
  const normalRows = weldRows.filter(r => r[30] !== '待判校正' && r[30] !== '重工校正' && r[30] !== '多肉校正');
  const reworkGoodBonus = weldRows.filter(r=>r[30]==='重工校正').reduce((s,r)=>s+(r[11]||0), 0);

  // ★ 每個日期+班次只取最新一筆（累計數字），避免重複加總
  const shiftLatest = {};
  normalRows.forEach(r => {
    const key = `${r[1]}_${r[2]}`; // 日期_班別
    if (!shiftLatest[key] || new Date(r[0]) > new Date(shiftLatest[key][0])) {
      shiftLatest[key] = r;
    }
  });
  const rows = Object.values(shiftLatest);

  const input  = rows.reduce((s,r)=>s+(r[10]||0),0);
  const good   = rows.reduce((s,r)=>s+(r[11]||0),0) + reworkGoodBonus;
  const defect = rows.reduce((s,r)=>s+(r[12]||0),0);
  const rework = rows.reduce((s,r)=>s+(r[13]||0),0);
  const yr = (good+defect)>0 ? +(good/(good+defect)*100).toFixed(1) : 0;
  const rr = input>0 ? +(rework/input*100).toFixed(1) : 0;
  const ar = target>0 ? +(input/target*100).toFixed(1) : 0;
  const activeMin = machRows.reduce((s,r)=>s+Number(r[4]||0),0);
  const tuneMin   = machRows.reduce((s,r)=>s+Number(r[5]||0),0);
  const stopMin   = machRows.reduce((s,r)=>s+Number(r[6]||0),0);
  const totalMin  = activeMin+tuneMin+stopMin;
  const oee = totalMin>0 ? +(activeMin/totalMin*100).toFixed(1) : 0;
  const defectMap = {};
  rows.forEach(r => DEFECT_LABELS.forEach((lbl,i) => {
    const v=r[14+i]||0; if(v>0) defectMap[lbl]=(defectMap[lbl]||0)+v;
  }));
  const totalNg = Object.values(defectMap).reduce((s,v)=>s+v,0);
  const top3 = Object.entries(defectMap).sort((a,b)=>b[1]-a[1]).slice(0,3);
  return { input, good, defect, rework, yr, rr, ar, oee, activeMin, tuneMin, stopMin, totalMin, top3, totalNg, defectMap };
}

// 線別詳細視窗
function DetailModal({ line, lineColor, data, target, onClose }) {
  const { input, good, defect, rework, yr, rr, ar, oee, activeMin, tuneMin, stopMin, totalMin, top3, totalNg, defectMap } = data;
  return (
    <div className="fixed inset-0 bg-black/85 z-50 flex items-center justify-center p-4 overflow-auto" onClick={onClose}>
      <div className="bg-slate-900 border border-slate-700 rounded-3xl w-full max-w-3xl shadow-2xl" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between p-5 border-b border-slate-800" style={{borderLeft:`5px solid ${lineColor}`,borderRadius:'1.5rem 1.5rem 0 0'}}>
          <div>
            <h2 className="text-2xl font-bold text-white">{line} 詳細報表</h2>
            <p className="text-slate-500 text-xs mt-0.5">完整不良分析 / 稼動時間分布</p>
          </div>
          <button onClick={onClose} className="bg-slate-800 hover:bg-slate-700 text-slate-400 px-4 py-2 rounded-xl text-sm font-bold">
            <i className="fa-solid fa-xmark mr-1"></i>關閉
          </button>
        </div>
        <div className="p-5 grid grid-cols-2 gap-4">
          {/* 四大指標 */}
          {[
            {label:'良率',   val:`${yr}%`,  color:yieldColor(yr)},
            {label:'稼動率', val:`${oee}%`, color:'#22d3ee'},
            {label:'達成率', val:target>0?`${ar}%`:'—', color:ar>=90?'#10b981':ar>=70?'#f59e0b':'#ef4444'},
            {label:'重工率', val:`${rr}%`,  color:rr>5?'#f97316':'#94a3b8'},
          ].map(s=>(
            <div key={s.label} className="bg-slate-800/50 rounded-2xl p-4 text-center">
              <div className="text-slate-500 text-sm mb-2">{s.label}</div>
              <div className="num font-bold text-4xl" style={{color:s.color}}>{s.val}</div>
            </div>
          ))}
        </div>
        {/* ★ 稼動 + 不良並排，移除 max-h 限制 */}
        <div className="px-5 pb-5 grid grid-cols-2 gap-4">
          {/* 稼動時間 */}
          <div className="bg-slate-800/30 rounded-2xl p-4">
            <div className="text-slate-400 text-sm font-bold mb-3">稼動時間分布</div>
            {[
              {label:'稼動',val:Math.round(activeMin),color:'bg-emerald-500',pct:totalMin>0?activeMin/totalMin:0},
              {label:'調機',val:Math.round(tuneMin),  color:'bg-blue-500',   pct:totalMin>0?tuneMin/totalMin:0},
              {label:'停機',val:Math.round(stopMin),  color:'bg-red-500',    pct:totalMin>0?stopMin/totalMin:0},
            ].map(s=>(
              <div key={s.label} className="mb-3">
                <div className="flex justify-between text-xs mb-1">
                  <span className="text-slate-400">{s.label}</span>
                  <span className="num text-white font-bold">{s.val}分鐘</span>
                </div>
                <div className="w-full h-2 bg-slate-700 rounded-full overflow-hidden">
                  <div className={`h-full ${s.color} rounded-full`} style={{width:(s.pct*100)+'%',transition:'width 0.8s'}}></div>
                </div>
              </div>
            ))}
          </div>
          {/* 完整不良分析（移除 max-h，全部顯示） */}
          <div className="bg-slate-800/30 rounded-2xl p-4">
            <div className="text-slate-400 text-sm font-bold mb-3">不良分析（共 {totalNg} pcs）</div>
            {totalNg > 0 ? (
              <div className="space-y-2.5">
                {Object.entries(defectMap||{}).sort((a,b)=>b[1]-a[1]).map(([lbl,cnt],i)=>{
                  const pct = totalNg>0?(cnt/totalNg*100).toFixed(1):0;
                  return (
                    <div key={lbl}>
                      <div className="flex justify-between text-xs mb-0.5">
                        <span className="text-slate-300 truncate flex-1">{lbl}</span>
                        <span className="num text-red-400 font-bold ml-2">{cnt}</span>
                        <span className="text-slate-500 ml-1 w-10 text-right">{pct}%</span>
                      </div>
                      <div className="w-full h-1.5 bg-slate-700 rounded-full overflow-hidden">
                        <div className={`h-full rounded-full ${i===0?'bg-red-500':i===1?'bg-orange-500':i===2?'bg-amber-500':'bg-slate-500'}`}
                          style={{width:pct+'%'}}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : <div className="text-slate-700 text-sm text-center py-4">此區間無不良記錄</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

// 線別卡片（三欄緊湊版）
function LineCard({ line, lineColor, weldRows, machRows, target, onClick }) {
  const rows = weldRows.filter(r=>r[30]!=='待判校正'&&r[30]!=='重工校正');
  if (rows.length === 0) {
    return (
      <div onClick={onClick} className="card flex items-center gap-3 bg-slate-900/30 border border-slate-800/50 rounded-xl px-4 py-2 cursor-pointer hover:bg-slate-900/60">
        <div className="font-bold text-slate-500 text-base w-16 shrink-0">{line}</div>
        <div className="text-slate-700 text-sm">此區間無資料</div>
        <div className="ml-auto text-slate-700 text-xs">點擊查看 →</div>
      </div>
    );
  }

  const d = calcLine(weldRows, machRows, target);
  const yrC = yieldColor(d.yr);

  return (
    <div onClick={onClick} className="card bg-slate-900/70 border border-slate-800 rounded-xl overflow-hidden"
      style={{borderLeft:`4px solid ${lineColor}`}}>
      <div className="grid grid-cols-3">

        {/* 左欄：線別 + 良率 */}
        <div className="px-4 py-3 border-r border-slate-800 flex items-center gap-4">
          <div>
            <div className="text-white font-bold text-xl mb-0.5">{line}</div>
            <div className="num font-bold text-4xl leading-none" style={{color:yrC}}>{d.yr}%</div>
            <div className="text-slate-500 text-xs mt-1.5">
              良品 <span className="text-slate-200 num font-bold text-sm">{d.good.toLocaleString()}</span>
              <span className="mx-1 text-slate-600">/</span>
              投入 <span className="num text-slate-300 text-sm">{d.input.toLocaleString()}</span>
            </div>
          </div>
          <div className="flex-1">
            <div className="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden mb-2">
              <div className="h-full rounded-full" style={{width:Math.min(100,d.yr)+'%',backgroundColor:yrC,transition:'width 0.8s'}}></div>
            </div>
            <div className="grid grid-cols-2 gap-1">
              <div className="text-center">
                <div className="text-slate-500 text-xs">稼動率</div>
                <div className="num font-bold text-xl text-cyan-400">{d.oee}%</div>
              </div>
              <div className="text-center">
                <div className="text-slate-500 text-xs">達成率</div>
                <div className="num font-bold text-xl" style={{color:d.ar>=90?'#10b981':d.ar>=70?'#f59e0b':'#ef4444'}}>
                  {target>0 ? d.ar+'%' : '—'}
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* 中欄：稼動條 + 數字 */}
        <div className="px-4 py-3 border-r border-slate-800 flex flex-col justify-center">
          <div className="text-slate-500 text-xs mb-1.5">稼動分布 <span className="num text-slate-300 font-bold">{Math.round(d.activeMin)}分鐘</span></div>
          <div className="flex h-2.5 bg-slate-800 overflow-hidden mb-2" style={{borderRadius:'4px'}}>
            {d.totalMin > 0 && <>
              <div className="h-full bg-emerald-500" style={{width:(d.activeMin/d.totalMin*100)+'%'}}></div>
              <div className="h-full bg-blue-500"    style={{width:(d.tuneMin/d.totalMin*100)+'%'}}></div>
              <div className="h-full bg-red-500"     style={{width:(d.stopMin/d.totalMin*100)+'%'}}></div>
            </>}
          </div>
          <div className="flex gap-4 mb-3">
            {[
              {color:'bg-emerald-500',label:'稼動',val:Math.round(d.activeMin)},
              {color:'bg-blue-500',   label:'調機',val:Math.round(d.tuneMin)},
              {color:'bg-red-500',    label:'停機',val:Math.round(d.stopMin)},
            ].map(s=>(
              <div key={s.label} className="flex items-center gap-1">
                <div className={`w-2 h-2 rounded-sm shrink-0 ${s.color}`}></div>
                <span className="text-slate-400 text-xs">{s.label}</span>
                <span className="num text-slate-300 text-xs font-bold">{s.val}m</span>
              </div>
            ))}
          </div>
          {target > 0 && (
            <div className="mt-1">
              <div className="flex justify-between text-xs mb-1">
                <span className="text-slate-500">達成率進度</span>
                <span className="num font-bold text-sm" style={{color:d.ar>=90?'#10b981':d.ar>=70?'#f59e0b':'#ef4444'}}>{d.ar}%</span>
              </div>
              <div className="w-full h-2.5 bg-slate-800 rounded-full overflow-hidden">
                <div className="h-full rounded-full" style={{
                  width:Math.min(100,d.ar)+'%',
                  backgroundColor:d.ar>=90?'#10b981':d.ar>=70?'#f59e0b':'#ef4444',
                  transition:'width 0.8s'
                }}></div>
              </div>
            </div>
          )}
        </div>

        {/* 右欄：TOP3 */}
        <div className="px-4 py-3 flex flex-col justify-center">
          <div className="flex items-center justify-between mb-1.5">
            <span className="text-slate-500 text-[9px] font-bold">TOP 3 不良</span>
            {d.totalNg > 0 && <span className="text-red-400 text-[9px] num">共 {d.totalNg} pcs</span>}
          </div>
          {d.top3.length > 0 ? d.top3.map(([lbl,cnt],i)=>{
            const pct = d.totalNg>0?(cnt/d.totalNg*100).toFixed(0):0;
            const barColor = i===0?'#ef4444':i===1?'#f97316':'#f59e0b';
            return (
              <div key={lbl} className="mb-1.5">
                <div className="flex items-center justify-between mb-0.5">
                  <div className="flex items-center gap-1 min-w-0">
                    <span className="text-slate-600 text-[9px] shrink-0">{i+1}</span>
                    <span className="text-slate-300 text-[10px] truncate">{lbl}</span>
                  </div>
                  <div className="flex items-center gap-1 shrink-0 ml-1">
                    <span className="num text-xs font-bold text-white">{cnt}</span>
                    <span className="text-[9px] font-bold" style={{color:barColor}}>{pct}%</span>
                  </div>
                </div>
                <div className="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                  <div className="h-full rounded-full" style={{width:pct+'%',backgroundColor:barColor,transition:'width 0.8s'}}></div>
                </div>
              </div>
            );
          }) : <div className="text-slate-700 text-xs text-center py-2">無不良記錄</div>}
        </div>
      </div>
    </div>
  );
}

function App() {
  const { from: defFrom, to: defTo } = getLastWeekRange();
  const [fromDate, setFromDate] = useState(defFrom);
  const [toDate,   setToDate]   = useState(defTo);
  const [loading, setLoading]   = useState(false);
  const [weldRows,    setWeldRows]    = useState([]);
  const [machineRows, setMachineRows] = useState([]);
  const [batchData,   setBatchData]   = useState([]);
  const [error, setError] = useState('');
  const [selectedLine, setSelectedLine] = useState(null);

  // ★ 重工分析頁籤
  const [activeTab, setActiveTab] = useState('weekly'); // 'weekly' | 'rework'
  const [reworkFrom, setReworkFrom] = useState(defFrom);
  const [reworkTo, setReworkTo]     = useState(defTo);
  const [reworkLine, setReworkLine] = useState('');
  const [reworkItems, setReworkItems]   = useState([]);
  const [reworkSummary, setReworkSummary] = useState([]);
  const [reworkLoading, setReworkLoading] = useState(false);

  const fetchReworkData = async () => {
    setReworkLoading(true);
    try {
      const params = new URLSearchParams({ action:'rework_list', from:reworkFrom, to:reworkTo });
      if (reworkLine) params.append('line', reworkLine);
      const data = await fetch(`${API_URL}?${params}`).then(r=>r.json());
      if (data.status==='ok') {
        setReworkItems(data.items||[]);
        setReworkSummary(data.summary||[]);
      }
    } catch(e) {}
    setReworkLoading(false);
  };

  const fetchData = async (from, to) => {
    setLoading(true); setError('');
    try {
      const [w,m,b] = await Promise.all([
        fetch(`${API_URL}?action=weld_log_range&from=${from}&to=${to}`).then(r=>r.json()),
        fetch(`${API_URL}?action=machine_log_range&from=${from}&to=${to}`).then(r=>r.json()),
        fetch(`${API_URL}?action=batch_all`).then(r=>r.json()),
      ]);
      if (w.status==='ok') setWeldRows(w.rows||[]); else setError(w.message||'載入失敗');
      if (m.status==='ok') setMachineRows(m.rows||[]);
      if (b.status==='ok') setBatchData(b.batches||[]);
    } catch(e) { setError('無法連線到 API'); }
    setLoading(false);
  };

  useEffect(() => { fetchData(fromDate, toDate); }, []);

  const setQuickRange = (label) => {
    const now = new Date(), dow = now.getDay(), dm = dow===0?6:dow-1;
    if (label==='本週') {
      const mon=new Date(now); mon.setDate(now.getDate()-dm); mon.setHours(0,0,0,0);
      setFromDate(mon.toISOString().slice(0,10)); setToDate(now.toISOString().slice(0,10));
    } else if (label==='上週') {
      const {from,to}=getLastWeekRange(); setFromDate(from); setToDate(to);
    } else if (label==='本月') {
      const first=new Date(now.getFullYear(),now.getMonth(),1);
      setFromDate(first.toISOString().slice(0,10)); setToDate(now.toISOString().slice(0,10));
    } else {
      const first=new Date(now.getFullYear(),now.getMonth()-1,1);
      const last=new Date(now.getFullYear(),now.getMonth(),0);
      setFromDate(first.toISOString().slice(0,10)); setToDate(last.toISOString().slice(0,10));
    }
  };

  const targetMap = useMemo(() => {
    const map = {};
    LINES.forEach(line => {
      map[line] = batchData.filter(b=>b.line===line).reduce((s,b)=>s+Number(b.target||0),0);
    });
    return map;
  }, [batchData]);

  const lineDataMap = useMemo(() => {
    const map = {};
    LINES.forEach(line => {
      map[line] = calcLine(
        weldRows.filter(r=>r[3]===line),
        machineRows.filter(r=>r[3]===line),
        targetMap[line]||0
      );
    });
    return map;
  }, [weldRows, machineRows, targetMap]);

  // 全廠總計（只算有資料的線）
  const linesWithData = LINES.filter(l => lineDataMap[l]?.input > 0);
  const totalInput  = linesWithData.reduce((s,l)=>s+lineDataMap[l].input,0);
  const totalGood   = linesWithData.reduce((s,l)=>s+lineDataMap[l].good,0);
  const avgYield    = totalInput>0 ? (totalGood/totalInput*100).toFixed(1) : '—';
  const avgOee      = linesWithData.length>0 ? (linesWithData.reduce((s,l)=>s+lineDataMap[l].oee,0)/linesWithData.length).toFixed(1) : '—';
  const totalTarget = LINES.reduce((s,l)=>s+(targetMap[l]||0),0);
  const avgAchieve  = totalTarget>0 ? (totalGood/totalTarget*100).toFixed(1) : '—';

  const selIdx   = selectedLine ? LINES.indexOf(selectedLine) : -1;
  const selColor = selIdx>=0 ? LINE_COLORS[selIdx] : '#fff';

  return (
    <div className="min-h-screen p-4 lg:p-6">
      {selectedLine && (
        <DetailModal line={selectedLine} lineColor={selColor}
          data={lineDataMap[selectedLine]}
          target={targetMap[selectedLine]||0}
          onClose={() => setSelectedLine(null)} />
      )}

      {/* Header */}
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-2.5">
            <i className="fa-solid fa-chart-line text-emerald-400"></i> 熔接線週報彙整
          </h1>
          <p className="text-slate-500 text-xs mt-1">點擊任一條線查看完整不良分析與稼動詳情</p>
        </div>
        <a href="menu.html" className="bg-slate-800 hover:bg-slate-700 text-slate-400 font-bold px-4 py-2 rounded-xl text-sm">
          <i className="fa-solid fa-arrow-left mr-1.5"></i>返回
        </a>
      </div>

      {/* ★ 頁籤切換 */}
      <div className="flex gap-2 mb-4 border-b border-slate-800 pb-3">
        <button onClick={() => setActiveTab('weekly')}
          className={`px-5 py-2 rounded-xl text-sm font-bold transition-all ${activeTab==='weekly' ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
          <i className="fa-solid fa-chart-line mr-1.5"></i>週報彙整
        </button>
        <button onClick={() => { setActiveTab('rework'); fetchReworkData(); }}
          className={`px-5 py-2 rounded-xl text-sm font-bold transition-all ${activeTab==='rework' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
          <i className="fa-solid fa-rotate mr-1.5"></i>重工分析
        </button>
      </div>

      {/* ★ 重工分析頁面 */}
      {activeTab === 'rework' && (
        <div className="space-y-4">
          {/* 篩選列 */}
          <div className="bg-slate-900/60 border border-slate-800 rounded-2xl p-3 flex flex-wrap items-center gap-2">
            <select value={reworkLine} onChange={e => setReworkLine(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-xl px-3 py-1.5 text-sm text-white outline-none">
              <option value="">全部線別</option>
              {LINES.map(l => <option key={l} value={l}>{l}</option>)}
            </select>
            <input type="date" value={reworkFrom} onChange={e => setReworkFrom(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-xl px-3 py-1.5 text-sm text-white outline-none"/>
            <span className="text-slate-600">～</span>
            <input type="date" value={reworkTo} onChange={e => setReworkTo(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-xl px-3 py-1.5 text-sm text-white outline-none"/>
            <button onClick={fetchReworkData}
              className="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-1.5 rounded-xl text-sm">
              {reworkLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-magnifying-glass"></i>}
            </button>
          </div>

          {/* 彙整統計卡片 */}
          {!reworkLoading && reworkSummary.length > 0 && (() => {
            const total = reworkSummary.reduce((s,r) => s + r.totalRework, 0);
            const good  = reworkSummary.reduce((s,r) => s + r.totalGood, 0);
            const bad   = reworkSummary.reduce((s,r) => s + r.totalBad, 0);
            const rate  = total > 0 ? (good/total*100).toFixed(1) : '—';
            const badRate = total > 0 ? (bad/total*100).toFixed(1) : '—';
            return (
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                {[
                  {label:'總重工數',    val:total,           unit:'支', color:'text-amber-400'},
                  {label:'重工後良品',  val:good,            unit:'支', color:'text-emerald-400'},
                  {label:'重工後不良',  val:bad,             unit:'支', color:'text-red-400'},
                  {label:'重工良品率',  val:rate+'%',        unit:'',   color: Number(rate)>=80?'text-emerald-400':Number(rate)>=60?'text-amber-400':'text-red-400'},
                ].map(s=>(
                  <div key={s.label} className="bg-slate-900/80 border border-slate-800 rounded-2xl p-4">
                    <div className="text-slate-500 text-xs mb-2">{s.label}</div>
                    <div className={`num font-bold text-3xl ${s.color}`}>{s.val}</div>
                    {s.unit && <div className="text-slate-600 text-xs mt-1">{s.unit}</div>}
                  </div>
                ))}
              </div>
            );
          })()}

          {reworkLoading && <div className="text-center py-8 text-slate-500"><i className="fa-solid fa-spinner fa-spin mr-2"></i>載入中...</div>}
          {!reworkLoading && reworkSummary.length === 0 && (
            <div className="text-center py-12 text-slate-600"><i className="fa-solid fa-rotate text-3xl mb-3 block"></i>此區間無重工記錄</div>
          )}

          {/* 各班彙整明細 */}
          {!reworkLoading && reworkSummary.length > 0 && (
            <div className="bg-slate-900/70 border border-slate-800 rounded-2xl overflow-hidden">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-slate-800 bg-slate-800/50">
                    {['日期','班別','線別','總重工','良品','不良','良品率','不良率','各位置明細'].map(h=>(
                      <th key={h} className="p-3 text-left text-slate-400 font-bold text-xs">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {reworkSummary.sort((a,b)=>b.date.localeCompare(a.date)).map((r,i)=>{
                    const goodRate = r.totalRework>0 ? (r.totalGood/r.totalRework*100).toFixed(1) : '—';
                    const badRate  = r.totalRework>0 ? (r.totalBad/r.totalRework*100).toFixed(1)  : '—';
                    const rateColor = Number(goodRate)>=80?'text-emerald-400':Number(goodRate)>=60?'text-amber-400':'text-red-400';
                    return (
                      <tr key={i} className="border-t border-slate-800 hover:bg-slate-800/30">
                        <td className="p-3 text-slate-300">{r.date}</td>
                        <td className="p-3 text-slate-300">{r.shift}</td>
                        <td className="p-3 text-white font-bold">{r.line}</td>
                        <td className="p-3 text-amber-400 num font-bold">{r.totalRework}</td>
                        <td className="p-3 text-emerald-400 num font-bold">{r.totalGood}</td>
                        <td className="p-3 text-red-400 num font-bold">{r.totalBad}</td>
                        <td className="p-3"><span className={`num font-bold ${rateColor}`}>{goodRate}{goodRate!=='—'?'%':''}</span></td>
                        <td className="p-3"><span className="num text-red-400">{badRate}{badRate!=='—'?'%':''}</span></td>
                        <td className="p-3">
                          <div className="flex flex-wrap gap-1">
                            {Object.entries(r.byLocation||{}).map(([loc,d])=>(
                              <div key={loc} className="text-[10px] bg-slate-800 rounded-lg px-2 py-1">
                                <span className="text-slate-400">{loc}</span>
                                <span className="text-slate-300 ml-1">{d.qty}支</span>
                                <span className="text-emerald-400 ml-1">良{d.good}</span>
                                <span className="text-red-400 ml-1">不良{d.bad}</span>
                              </div>
                            ))}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* 週報內容 */}
      {activeTab === 'weekly' && <>

      {/* 日期區間 */}
      <div className="bg-slate-900/60 border border-slate-800 rounded-2xl p-3 mb-4 flex flex-wrap items-center gap-2">
        {['本週','上週','本月','上月'].map(l=>(
          <button key={l} onClick={()=>setQuickRange(l)}
            className="px-3 py-1.5 rounded-lg text-sm font-bold bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-all">{l}</button>
        ))}
        <div className="flex items-center gap-2 ml-1">
          <input type="date" value={fromDate} onChange={e=>setFromDate(e.target.value)}
            className="bg-slate-800 border border-slate-700 rounded-xl px-3 py-1.5 text-sm text-white outline-none focus:border-emerald-500"/>
          <span className="text-slate-600">～</span>
          <input type="date" value={toDate} onChange={e=>setToDate(e.target.value)}
            className="bg-slate-800 border border-slate-700 rounded-xl px-3 py-1.5 text-sm text-white outline-none focus:border-emerald-500"/>
          <button onClick={()=>fetchData(fromDate,toDate)}
            className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 py-1.5 rounded-xl text-sm">
            {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-magnifying-glass"></i>}
          </button>
        </div>
      </div>

      {/* 全廠總覽卡片 */}
      {!loading && totalInput > 0 && (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
          {[
            {label:'平均良率 (Yield)', val:avgYield+'%',   color:'#f59e0b', icon:'fa-circle-check'},
            {label:'平均稼動率 (OEE)', val:avgOee+'%',    color:'#22d3ee', icon:'fa-gauge-high'},
            {label:'目標達成率 (Goal)',val:avgAchieve+'%', color:'#10b981', icon:'fa-bullseye'},
            {label:'週期累計投入',      val:totalInput.toLocaleString(), color:'#e2e8f0', icon:'fa-boxes-stacked', unit:'pcs'},
          ].map(s=>(
            <div key={s.label} className="bg-slate-900/80 border border-slate-800 rounded-2xl p-4">
              <div className="flex items-center gap-2 mb-2">
                <i className={`fa-solid ${s.icon} text-sm`} style={{color:s.color}}></i>
                <span className="text-slate-500 text-xs">{s.label}</span>
              </div>
              <div className="num font-bold text-4xl" style={{color:s.color}}>{s.val}</div>
              {s.unit && <div className="text-slate-600 text-xs mt-1">{s.unit}</div>}
            </div>
          ))}
        </div>
      )}

      {error && <div className="bg-red-950/40 border border-red-700/50 rounded-2xl p-4 mb-4 text-red-400 text-sm"><i className="fa-solid fa-triangle-exclamation mr-2"></i>{error}</div>}
      {loading && <div className="text-center py-16 text-slate-500"><i className="fa-solid fa-spinner fa-spin text-2xl mb-3 block text-emerald-500"></i>載入資料中...</div>}
      {!loading && weldRows.length === 0 && !error && (
        <div className="text-center py-16 text-slate-600"><i className="fa-solid fa-chart-line text-3xl mb-3 block"></i>選擇日期區間後按查詢</div>
      )}

      {/* 各線卡片 */}
      {!loading && weldRows.length > 0 && (
        <div className="space-y-1.5">
          {LINES.map((line,i) => (
            <LineCard key={line} line={line} lineColor={LINE_COLORS[i]}
              weldRows={weldRows.filter(r=>r[3]===line)}
              machRows={machineRows.filter(r=>r[3]===line)}
              target={targetMap[line]||0}
              onClick={() => setSelectedLine(line)} />
          ))}
        </div>
      )}
      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
