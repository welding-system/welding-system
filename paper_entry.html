<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熔接紙本資料輸入</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: #020817; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  input, select { color-scheme: dark; }
</style>
</head>
<body class="text-slate-100 min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

const API_URL = "https://script.google.com/macros/s/AKfycbxITB84zMMmsoA85EysG_OnOdW8U7yoCLihJlCE-SRC4FX_9Y1JfOdET7fLp9ga0yUUQw/exec";

const LINES = ['1號線','2號線','3號線','4號線','5號線','6號線','7號線','8號線'];
const SHIFTS = ['早班','中班','夜班','早+中','中+早'];
const DEFECT_REASONS = [
  '熔接不良(正)','熔接不良(反)','熔接不良(側)','熔接不良(底)',
  '損傷','組裝不良','機台操作不當','調機不良','髒污',
  '按鈕對位','相機鍵異常','異色點','鏟傷多肉','其他'
];
const COLOR_CODE_MAP = { '4F':'灰', '4E':'黑', '6D':'稜線灰', '6E':'荒徑綠', '6C':'煙嵐紫' };

const emptyRow = () => ({
  id: Date.now() + Math.random(),
  no: '',
  modelFull: '',      // 完整料號 ex: 118ARF3274F
  batchNo: '',        // 第幾批
  line: '',           // 線別
  machine: '',        // 機台備注（可選）
  incomingDate: '',   // 來料日期
  orderQty: '',       // 工單數量
  weldQty: '',        // 熔接數量（投入）
  weldDate: '',       // 熔接日期
  shift: '早班',      // 班別
  goodQty: '',        // 熔接良品數量
  defects: {},        // 不良分類 { '熔接不良(正)': 3, ... }
  done: '',           // 完單與否
  note: '',           // 備註
  status: 'pending',  // pending / submitting / done / error
  errorMsg: '',
});

// 從料號解析型號和顏色代碼
function parseModel(fullModel) {
  // 118ARF3274F → model: '327', color: '灰', colorCode: '4F'
  const match = fullModel.match(/^118ARF(\d+)([A-Z0-9]+)$/);
  if (!match) return null;
  const modelNum = match[1];
  const colorCode = match[2];
  const colorName = COLOR_CODE_MAP[colorCode] || colorCode;
  return { model: modelNum, color: colorName, colorCode };
}

function App() {
  const [rows, setRows] = useState([emptyRow()]);
  const [toasts, setToasts] = useState([]);
  const [submitting, setSubmitting] = useState(false);
  const [expandedDefect, setExpandedDefect] = useState(null); // 展開哪行的不良明細

  const showToast = (msg, type='info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
  };

  const updateRow = (idx, field, value) => {
    setRows(prev => prev.map((r, i) => i === idx ? { ...r, [field]: value } : r));
  };

  const updateDefect = (idx, reason, value) => {
    setRows(prev => prev.map((r, i) => {
      if (i !== idx) return r;
      const defects = { ...r.defects };
      const v = parseInt(value) || 0;
      if (v <= 0) delete defects[reason];
      else defects[reason] = v;
      return { ...r, defects };
    }));
  };

  const addRow = () => setRows(prev => [...prev, emptyRow()]);

  const deleteRow = (idx) => {
    if (rows.length === 1) { setRows([emptyRow()]); return; }
    setRows(prev => prev.filter((_, i) => i !== idx));
  };

  const cloneRow = (idx) => {
    const base = { ...rows[idx], id: Date.now() + Math.random(), no: '', status: 'pending', errorMsg: '' };
    setRows(prev => [...prev.slice(0, idx+1), base, ...prev.slice(idx+1)]);
  };

  // 計算不良數（投入 - 良品，或分類加總取較大值）
  const calcDefect = (row) => {
    const input = parseInt(row.weldQty) || 0;
    const good  = parseInt(row.goodQty) || 0;
    const defectTotal = Object.values(row.defects).reduce((a,b) => a+b, 0);
    const bySubtract = Math.max(0, input - good);
    return defectTotal > 0 ? defectTotal : bySubtract;
  };

  // 單筆驗證
  const validateRow = (row) => {
    if (!row.modelFull.trim()) return '請填寫料號';
    if (!parseModel(row.modelFull.trim())) return `料號格式有誤（應為 118ARF+型號+顏色代碼，如 118ARF3274F）`;
    if (!row.line) return '請選擇線別';
    if (!row.weldDate) return '請填寫熔接日期';
    if (!row.shift) return '請選擇班別';
    if (!row.weldQty || parseInt(row.weldQty) <= 0) return '熔接數量需大於0';
    if (!row.goodQty || parseInt(row.goodQty) < 0) return '良品數量不能為負數';
    if (parseInt(row.goodQty) > parseInt(row.weldQty)) return '良品數量不能超過投入數量';
    return null;
  };

  // 送出單筆
  const submitRow = async (idx) => {
    const row = rows[idx];
    const err = validateRow(row);
    if (err) { showToast(`第${idx+1}筆：${err}`, 'error'); return; }

    const parsed = parseModel(row.modelFull.trim());
    updateRow(idx, 'status', 'submitting');

    const defectTotal = calcDefect(row);
    const defectArr = DEFECT_REASONS.map(r => row.defects[r] || 0);

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'weld_report',
          date: row.weldDate,
          shift: row.shift,
          line: row.line,
          assembler: '紙本輸入',
          machineOp: row.machine || '',
          inspector: '',
          model: parsed.model,
          color: parsed.color,
          batch: row.batchNo || '第一批',
          input: parseInt(row.weldQty) || 0,
          good:  parseInt(row.goodQty) || 0,
          defect: defectTotal,
          rework: 0,
          defectDetails: defectArr,
          incomingInnerDefect: 0,
          incomingOuterDefect: 0,
          faiCount: 0,
          note: [
            row.note,
            row.no ? `NO.${row.no}` : '',
            row.orderQty ? `工單:${row.orderQty}` : '',
            row.incomingDate ? `來料:${row.incomingDate}` : '',
            row.done ? `完單:${row.done}` : '',
            '【紙本補登】',
          ].filter(Boolean).join(' | '),
        }),
      });
      const data = await res.json();
      if (data.status === 'ok') {
        setRows(prev => prev.map((r, i) => i === idx ? { ...r, status: 'done' } : r));
        showToast(`第${idx+1}筆寫入成功 ✅`, 'success');
      } else {
        setRows(prev => prev.map((r, i) => i === idx ? { ...r, status: 'error', errorMsg: data.message || '未知錯誤' } : r));
        showToast(`第${idx+1}筆失敗：${data.message}`, 'error');
      }
    } catch(e) {
      setRows(prev => prev.map((r, i) => i === idx ? { ...r, status: 'error', errorMsg: '網路連線失敗' } : r));
      showToast(`第${idx+1}筆失敗：網路連線失敗`, 'error');
    }
  };

  // 全部送出
  const submitAll = async () => {
    const pending = rows.filter(r => r.status !== 'done');
    if (pending.length === 0) { showToast('所有資料都已寫入完成', 'info'); return; }

    for (let i = 0; i < rows.length; i++) {
      if (rows[i].status === 'done') continue;
      const err = validateRow(rows[i]);
      if (err) { showToast(`第${i+1}筆驗證失敗：${err}，請修正後再送出`, 'error'); return; }
    }

    setSubmitting(true);
    for (let i = 0; i < rows.length; i++) {
      if (rows[i].status === 'done') continue;
      await submitRow(i);
      await new Promise(r => setTimeout(r, 300)); // 避免 API 過快
    }
    setSubmitting(false);
    showToast('全部送出完成！', 'success');
  };

  const pendingCount = rows.filter(r => r.status !== 'done').length;
  const doneCount = rows.filter(r => r.status === 'done').length;

  return (
    <div className="min-h-screen p-4 lg:p-6">
      {/* Toast */}
      <div className="fixed top-4 right-4 z-50 space-y-2 pointer-events-none">
        {toasts.map(t => (
          <div key={t.id} className={`px-4 py-3 rounded-xl text-sm font-bold shadow-xl ${
            t.type==='success' ? 'bg-emerald-700 text-white' :
            t.type==='error'   ? 'bg-red-700 text-white' : 'bg-slate-700 text-white'
          }`}>{t.msg}</div>
        ))}
      </div>

      {/* Header */}
      <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold text-amber-400 flex items-center gap-2.5">
            <i className="fa-solid fa-file-import"></i> 熔接紙本資料輸入
          </h1>
          <p className="text-slate-500 text-xs mt-1">照紙本格式逐筆輸入，填完後寫入「熔接報工紀錄」分頁</p>
        </div>
        <div className="flex items-center gap-3">
          <span className="text-slate-500 text-sm">共 {rows.length} 筆 / 已完成 {doneCount} 筆</span>
          <a href="menu.html" className="bg-slate-800 hover:bg-slate-700 text-slate-400 font-bold px-4 py-2 rounded-xl text-sm transition-all">
            <i className="fa-solid fa-arrow-left mr-1.5"></i>返回選單
          </a>
        </div>
      </div>

      {/* 欄位說明 */}
      <div className="bg-amber-950/20 border border-amber-800/40 rounded-xl p-3 mb-5 text-amber-300 text-xs flex flex-wrap gap-x-6 gap-y-1">
        <span><i className="fa-solid fa-circle-info mr-1"></i>料號格式：<strong>118ARF</strong>+型號+顏色代碼，例：118ARF3274F</span>
        <span>顏色代碼：4F=灰 / 4E=黑 / 6D=稜線灰 / 6E=荒徑綠 / 6C=煙嵐紫</span>
        <span>不良數量：若有填分類，以分類加總為準；若沒填分類，自動計算投入-良品</span>
      </div>

      {/* 資料列 */}
      <div className="space-y-3 mb-6">
        {rows.map((row, idx) => {
          const parsed = row.modelFull ? parseModel(row.modelFull.trim()) : null;
          const defectTotal = calcDefect(row);
          const defectSum = Object.values(row.defects).reduce((a,b)=>a+b,0);
          const isDone = row.status === 'done';
          const isError = row.status === 'error';

          return (
            <div key={row.id} className={`bg-slate-900 border rounded-2xl overflow-hidden transition-all ${
              isDone ? 'border-emerald-700/50 opacity-70' :
              isError ? 'border-red-700' : 'border-slate-800'
            }`}>
              {/* 列標題列 */}
              <div className={`flex items-center justify-between px-4 py-2.5 border-b ${
                isDone ? 'bg-emerald-950/30 border-emerald-800/30' :
                isError ? 'bg-red-950/30 border-red-800/30' : 'bg-slate-800/40 border-slate-800'
              }`}>
                <div className="flex items-center gap-3">
                  <span className="text-slate-400 text-xs font-bold">第 {idx+1} 筆</span>
                  {parsed && (
                    <span className="text-cyan-300 text-xs font-mono font-bold">
                      {row.modelFull} → {parsed.model} / {parsed.color}
                    </span>
                  )}
                  {isDone && <span className="text-emerald-400 text-xs font-bold"><i className="fa-solid fa-check mr-1"></i>已寫入</span>}
                  {isError && <span className="text-red-400 text-xs font-bold"><i className="fa-solid fa-xmark mr-1"></i>{row.errorMsg}</span>}
                </div>
                <div className="flex gap-1.5">
                  {!isDone && (
                    <button onClick={() => submitRow(idx)} disabled={row.status==='submitting' || submitting}
                      className="bg-amber-600 hover:bg-amber-500 disabled:bg-slate-700 text-white font-bold px-3 py-1.5 rounded-lg text-xs transition-all">
                      {row.status==='submitting' ? <i className="fa-solid fa-spinner fa-spin"></i> : '寫入'}
                    </button>
                  )}
                  {isDone && (
                    <button onClick={() => setRows(prev => prev.map((r,i) => i===idx ? {...r, status:'pending'} : r))}
                      className="bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold px-3 py-1.5 rounded-lg text-xs">
                      重填
                    </button>
                  )}
                  <button onClick={() => cloneRow(idx)} className="bg-slate-700 hover:bg-slate-600 text-slate-400 px-2.5 py-1.5 rounded-lg text-xs" title="複製此列">
                    <i className="fa-solid fa-copy"></i>
                  </button>
                  <button onClick={() => deleteRow(idx)} className="bg-red-950/40 hover:bg-red-900/60 text-red-400 px-2.5 py-1.5 rounded-lg text-xs">
                    <i className="fa-solid fa-trash"></i>
                  </button>
                </div>
              </div>

              {/* 欄位輸入區 */}
              <div className={`p-4 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3 ${isDone ? 'pointer-events-none' : ''}`}>

                {/* NO. */}
                <div>
                  <label className="block text-slate-500 text-xs mb-1">NO.</label>
                  <input type="text" value={row.no} onChange={e => updateRow(idx,'no',e.target.value)}
                    placeholder="1"
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-amber-500 text-white"
                  />
                </div>

                {/* 料號 */}
                <div className="col-span-2">
                  <label className="block text-slate-500 text-xs mb-1">料號 <span className="text-red-400">*</span></label>
                  <input type="text" value={row.modelFull} onChange={e => updateRow(idx,'modelFull',e.target.value.toUpperCase())}
                    placeholder="118ARF3274F"
                    className={`w-full bg-slate-950 border rounded-lg p-2 text-sm outline-none font-mono text-white ${
                      row.modelFull && !parseModel(row.modelFull.trim()) ? 'border-red-600' : 'border-slate-700 focus:border-amber-500'
                    }`}
                  />
                </div>

                {/* 第幾批 */}
                <div>
                  <label className="block text-slate-500 text-xs mb-1">第幾批</label>
                  <input type="text" value={row.batchNo} onChange={e => updateRow(idx,'batchNo',e.target.value)}
                    placeholder="第一批"
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-amber-500 text-white"
                  />
                </div>

                {/* 線別 */}
                <div>
                  <label className="block text-slate-500 text-xs mb-1">線別 <span className="text-red-400">*</span></label>
                  <select value={row.line} onChange={e => updateRow(idx,'line',e.target.value)}
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-amber-500 text-white"
                  >
                    <option value="">選擇</option>
                    {LINES.map(l => <option key={l} value={l}>{l}</option>)}
                  </select>
                </div>

                {/* 機台 */}
                <div>
                  <label className="block text-slate-500 text-xs mb-1">機台（選填）</label>
                  <input type="text" value={row.machine} onChange={e => updateRow(idx,'machine',e.target.value)}
                    placeholder="HM100"
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-amber-500 text-white"
                  />
                </div>

                {/* 來料日期 */}
                <div>
                  <label className="block text-slate-500 text-xs mb-1">來料日期</label>
                  <input type="date" value={row.incomingDate} onChange={e => updateRow(idx,'incomingDate',e.target.value)}
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-amber-500 text-white"
                  />
                </div>

                {/* 工單數量 */}
                <div>
                  <label className="block text-slate-500 text-xs mb-1">工單數量</label>
                  <input type="number" value={row.orderQty} onChange={e => updateRow(idx,'orderQty',e.target.value)}
                    placeholder="0"
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-amber-500 text-white"
                  />
                </div>

                {/* 熔接數量（投入）*/}
                <div>
                  <label className="block text-slate-500 text-xs mb-1">熔接數量（投入）<span className="text-red-400">*</span></label>
                  <input type="number" value={row.weldQty} onChange={e => updateRow(idx,'weldQty',e.target.value)}
                    placeholder="0"
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-amber-500 text-white font-mono font-bold"
                  />
                </div>

                {/* 熔接日期 */}
                <div>
                  <label className="block text-slate-500 text-xs mb-1">熔接日期 <span className="text-red-400">*</span></label>
                  <input type="date" value={row.weldDate} onChange={e => updateRow(idx,'weldDate',e.target.value)}
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-amber-500 text-white"
                  />
                </div>

                {/* 班別 */}
                <div>
                  <label className="block text-slate-500 text-xs mb-1">班別 <span className="text-red-400">*</span></label>
                  <select value={row.shift} onChange={e => updateRow(idx,'shift',e.target.value)}
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-amber-500 text-white"
                  >
                    {SHIFTS.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>

                {/* 熔接良品數量 */}
                <div>
                  <label className="block text-slate-500 text-xs mb-1">熔接良品數量 <span className="text-red-400">*</span></label>
                  <input type="number" value={row.goodQty} onChange={e => updateRow(idx,'goodQty',e.target.value)}
                    placeholder="0"
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-amber-500 text-emerald-300 font-mono font-bold"
                  />
                </div>

                {/* 不良數（自動計算）+ 展開分類 */}
                <div>
                  <label className="block text-slate-500 text-xs mb-1">
                    不良數
                    {defectSum > 0 && <span className="text-amber-400 ml-1">（已填分類）</span>}
                  </label>
                  <div className="flex gap-1.5">
                    <div className={`flex-1 bg-slate-950 border rounded-lg p-2 text-sm font-mono font-bold text-center ${
                      defectTotal > 0 ? 'text-red-400 border-red-800/50' : 'text-slate-600 border-slate-700'
                    }`}>
                      {defectTotal}
                    </div>
                    <button onClick={() => setExpandedDefect(expandedDefect === row.id ? null : row.id)}
                      className={`px-2.5 rounded-lg text-xs font-bold border transition-all ${
                        defectSum > 0 ? 'bg-red-950/40 border-red-700/50 text-red-400' : 'bg-slate-800 border-slate-700 text-slate-400 hover:text-white'
                      }`} title="展開不良分類">
                      <i className="fa-solid fa-list-ul"></i>
                    </button>
                  </div>
                </div>

                {/* 完單與否 */}
                <div>
                  <label className="block text-slate-500 text-xs mb-1">完單與否</label>
                  <select value={row.done} onChange={e => updateRow(idx,'done',e.target.value)}
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-amber-500 text-white"
                  >
                    <option value="">—</option>
                    <option value="Y">✅ Y 完單</option>
                    <option value="N">❌ N 未完單</option>
                  </select>
                </div>

                {/* 備註 */}
                <div className="col-span-2 lg:col-span-2">
                  <label className="block text-slate-500 text-xs mb-1">備註</label>
                  <input type="text" value={row.note} onChange={e => updateRow(idx,'note',e.target.value)}
                    placeholder="補充說明..."
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-amber-500 text-white"
                  />
                </div>
              </div>

              {/* 不良分類展開區 */}
              {expandedDefect === row.id && (
                <div className="px-4 pb-4 border-t border-slate-800 pt-3">
                  <div className="text-slate-400 text-xs font-bold mb-3">
                    不良分類明細（選填，填了之後以分類加總為準）
                  </div>
                  <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-2">
                    {DEFECT_REASONS.map(reason => (
                      <div key={reason}>
                        <label className="block text-slate-500 text-[10px] mb-1 truncate" title={reason}>{reason}</label>
                        <input type="number" min="0"
                          value={row.defects[reason] || ''}
                          onChange={e => updateDefect(idx, reason, e.target.value)}
                          placeholder="0"
                          className="w-full bg-slate-950 border border-slate-700 rounded-lg p-1.5 text-sm outline-none focus:border-red-500 text-red-300 text-center"
                        />
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* 底部操作列 */}
      <div className="sticky bottom-4 flex gap-3 justify-between items-center bg-slate-900/90 backdrop-blur border border-slate-800 rounded-2xl p-4 shadow-2xl">
        <div className="flex gap-2">
          <button onClick={addRow}
            className="bg-slate-700 hover:bg-slate-600 text-white font-bold px-5 py-3 rounded-xl text-sm transition-all flex items-center gap-2">
            <i className="fa-solid fa-plus"></i> 新增一筆
          </button>
          <button onClick={() => setRows([emptyRow()])}
            className="bg-slate-800 hover:bg-slate-700 text-slate-400 font-bold px-4 py-3 rounded-xl text-sm transition-all">
            <i className="fa-solid fa-rotate-left mr-1.5"></i>清空
          </button>
        </div>
        <div className="text-slate-500 text-sm hidden md:block">
          {pendingCount > 0 ? `還有 ${pendingCount} 筆待寫入` : '全部已完成 ✅'}
        </div>
        <button onClick={submitAll} disabled={submitting || pendingCount === 0}
          className="bg-amber-600 hover:bg-amber-500 disabled:bg-slate-700 disabled:cursor-not-allowed text-white font-bold px-8 py-3 rounded-xl text-base transition-all active:scale-95 flex items-center gap-2 shadow-lg">
          {submitting ? <><i className="fa-solid fa-spinner fa-spin"></i> 寫入中...</> : <><i className="fa-solid fa-file-import"></i> 全部寫入 ({pendingCount}筆)</>}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
