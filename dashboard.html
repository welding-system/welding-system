<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熔接生產即時看板</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #060b18; }
  #root { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; }
  body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: #060b18; color: #e2e8f0; }
  .num { font-family: 'SF Mono','Consolas',monospace; font-variant-numeric: tabular-nums; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .pulse-dot { animation: pulse-dot 2s infinite; }
  .blink { animation: blink 1s step-end infinite; }
  .glow-green { box-shadow: inset 0 0 0 1px rgba(34,197,94,0.3); }
  .glow-amber { box-shadow: inset 0 0 0 1px rgba(245,158,11,0.3); }
  .glow-red   { box-shadow: inset 0 0 0 1px rgba(239,68,68,0.4); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const API_URL  = "https://script.google.com/macros/s/AKfycbxITB84zMMmsoA85EysG_OnOdW8U7yoCLihJlCE-SRC4FX_9Y1JfOdET7fLp9ga0yUUQw/exec";
const LINES    = ['1號線','2號線','3號線','4號線','5號線','6號線','7號線','8號線'];
const REFRESH_INTERVAL = 5 * 60 * 1000;
const DEFECT_LABELS = ["熔接不良(正)","熔接不良(反)","熔接不良(側)","熔接不良(底)","損傷","組裝不良","機台操作不當","調機不良","髒污","按鈕對位","相機鍵異常","異色點","鏟傷多肉","其他"];

function todayStr() {
  return new Date().toLocaleDateString('zh-TW',{timeZone:'Asia/Taipei',year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
}

function Clock() {
  const [t, setT] = useState(new Date());
  useEffect(() => { const i = setInterval(()=>setT(new Date()),1000); return ()=>clearInterval(i); },[]);
  const hh=String(t.getHours()).padStart(2,'0'), mm=String(t.getMinutes()).padStart(2,'0'), ss=String(t.getSeconds()).padStart(2,'0');
  return <span className="num font-bold text-white text-xl">{hh}<span className="blink">:</span>{mm}<span className="blink">:</span>{ss}</span>;
}

function LineCard({ line, lineColor, data, machData, isOnline }) {
  const batch = data?.batch;
  const currentShift = data?.currentShift;
  const weldRows = data?.todayRows || [];

  const input  = weldRows.reduce((s,r)=>s+(r.input||0),0);
  const good   = weldRows.reduce((s,r)=>s+(r.good||0),0);
  const defect = weldRows.reduce((s,r)=>s+(r.defect||0),0);
  const rework = weldRows.reduce((s,r)=>s+(r.rework||0),0);
  const target = batch?.target || 0;
  const tuneMin = machData?.tuneMin || 0;

  const yr = input>0 ? (good/input*100).toFixed(1) : '0.0';
  const ar = target>0 ? (good/target*100).toFixed(1) : '—';
  const oee = machData?.oeeRate ?? 0;
  const rr  = input>0 ? (rework/input*100).toFixed(1) : '0.0';

  const defectMap = {};
  weldRows.forEach(r => DEFECT_LABELS.forEach((lbl,i)=>{ if(r.defectDetails?.[i]>0) defectMap[lbl]=(defectMap[lbl]||0)+r.defectDetails[i]; }));
  const top3 = Object.entries(defectMap).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const totalNg = Object.values(defectMap).reduce((s,v)=>s+v,0);

  // ★ 狀態判斷：isOnline 才算「生產中」，沒登入只顯示「待機」
  const isIdle = !batch || !isOnline;
  let statusLabel, statusBg, borderColor, glowClass, rowBg;
  if (!batch) {
    statusLabel='閒置'; statusBg='text-slate-500'; borderColor='#334155'; glowClass=''; rowBg='bg-slate-900/30';
  } else if (!isOnline) {
    statusLabel='待機'; statusBg='text-slate-400'; borderColor='#475569'; glowClass=''; rowBg='bg-slate-900/50';
  } else if (batch?.batchStatus==='暫停中') {
    statusLabel='暫停'; statusBg='text-orange-400'; borderColor='#f97316'; glowClass='glow-amber'; rowBg='bg-orange-950/20';
  } else if (Number(yr)<80 && input>0) {
    statusLabel='生產中'; statusBg='text-red-400'; borderColor='#ef4444'; glowClass='glow-red'; rowBg='bg-red-950/20';
  } else if (Number(yr)<90 && input>0) {
    statusLabel='生產中'; statusBg='text-amber-400'; borderColor='#f59e0b'; glowClass='glow-amber'; rowBg='bg-amber-950/10';
  } else {
    statusLabel='生產中'; statusBg='text-emerald-400'; borderColor='#22c55e'; glowClass='glow-green'; rowBg='bg-emerald-950/10';
  }

  const yrColor = Number(yr)>=90?'text-emerald-400':Number(yr)>=80?'text-amber-400':'text-red-400';
  const arColor = ar==='—'?'text-slate-600':Number(ar)>=90?'text-emerald-400':Number(ar)>=80?'text-amber-400':'text-red-400';

  return (
    <div className={`${rowBg} ${glowClass} rounded-xl flex items-stretch`}
      style={{borderLeft:`4px solid ${borderColor}`, flex:1, minHeight:0}}>
      <div className="flex flex-col justify-center px-4 w-72 shrink-0 border-r border-slate-800">
        <div className="flex items-center gap-2 mb-1.5">
          <span className="font-bold text-white text-3xl tracking-tight">{line}</span>
          <span className={`text-sm font-bold px-1.5 py-0.5 rounded bg-slate-800/80 ${statusBg}`}>{statusLabel}</span>
          {currentShift && <span className="text-xs font-medium text-slate-400 bg-slate-800 px-1.5 py-0.5 rounded">{currentShift}</span>}
        </div>
        {batch
          ? <div className="text-sm text-slate-300 font-semibold font-mono">{batch.model}{batch.color} · {batch.batchNo}</div>
          : <div className="text-sm text-slate-600">尚未分配批次</div>}
      </div>
      <div className="flex-1 grid grid-cols-6 items-center border-r border-slate-800 px-1 text-center">
        {[
          {label:'目標',   val:target||'—', color:'text-slate-400'},
          {label:'投入',   val:input,        color:'text-cyan-300'},
          {label:'良品',   val:good,         color:yrColor},
          {label:'不良',   val:defect,       color:defect>0?'text-red-400':'text-slate-600'},
          {label:'重工',   val:rework,       color:rework>0?'text-amber-400':'text-slate-600'},
          {label:'調機(m)',val:tuneMin,      color:tuneMin>30?'text-orange-400':'text-blue-400'},
        ].map(s=>(
          <div key={s.label} className="flex flex-col justify-center items-center">
            <div className="text-slate-500 text-xs font-medium mb-1">{s.label}</div>
            <div className={`num font-bold text-4xl leading-none ${s.color}`}>{s.val}</div>
          </div>
        ))}
      </div>
      <div className="flex flex-col justify-center px-3 w-44 shrink-0 border-r border-slate-800">
        <div className="text-slate-500 text-xs mb-1.5 font-bold">不良 TOP3</div>
        {top3.length > 0 ? top3.map(([lbl,cnt],i)=>(
          <div key={lbl} className="flex items-center gap-1.5 mb-1">
            <span className="text-slate-700 text-xs w-3">{i+1}</span>
            <span className="text-slate-300 text-xs flex-1 truncate">{lbl}</span>
            <span className="text-red-400 text-sm font-bold num">{cnt}</span>
            <span className="text-slate-600 text-[10px]">({totalNg>0?(cnt/totalNg*100).toFixed(0):0}%)</span>
          </div>
        )) : <div className="text-slate-700 text-xs">— 無不良 —</div>}
      </div>
      <div className="grid grid-cols-4 items-center px-2 w-96 shrink-0 text-center">
        {[
          {label:'達成率', val:ar==='—'?'—':ar+'%', color:arColor},
          {label:'良率',   val:yr+'%',   color:yrColor},
          {label:'稼動率', val:oee+'%',  color:Number(oee)>=85?'text-cyan-400':'text-amber-400'},
          {label:'重工率', val:rr+'%',   color:Number(rr)>5?'text-orange-400':'text-slate-500'},
        ].map(s=>(
          <div key={s.label} className="flex flex-col justify-center items-center">
            <div className="text-slate-500 text-xs mb-1">{s.label}</div>
            <div className={`num font-bold text-2xl leading-none ${s.color}`}>{s.val}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [lineData,   setLineData]   = useState({});
  const [onlineMap,  setOnlineMap]  = useState({});
  const [loading,    setLoading]    = useState(true);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [countdown,  setCountdown]  = useState(REFRESH_INTERVAL/1000);
  const countdownRef = useRef(REFRESH_INTERVAL/1000);

  const fetchAll = useCallback(async () => {
    setLoading(true);
    try {
      const today = todayStr();
      const [weldRes, machRes, batchRes, onlineRes] = await Promise.all([
        fetch(`${API_URL}?action=weld_log_range&from=${today}&to=${today}`).then(r=>r.json()),
        fetch(`${API_URL}?action=machine_log_range&from=${today}&to=${today}`).then(r=>r.json()),
        fetch(`${API_URL}?action=batch_all`).then(r=>r.json()),
        fetch(`${API_URL}?action=online_status`).then(r=>r.json()),
      ]);
      const weldRows   = weldRes.status==='ok'   ? weldRes.rows     : [];
      const machRows   = machRes.status==='ok'   ? machRes.rows     : [];
      const allBatches = batchRes.status==='ok'  ? batchRes.batches : [];
      const online     = onlineRes.status==='ok' ? onlineRes.onlineMap : {};
      setOnlineMap(online);

      const result = {};
      LINES.forEach(line => {
        const batch = allBatches.find(b=>b.line===line&&(b.status==='進行中'||b.status==='暫停中'))||null;
        const allLineRows = weldRows.filter(r=>r[3]===line&&r[30]!=='待判校正');
        const sorted = [...allLineRows].sort((a,b)=>new Date(b[0])-new Date(a[0]));
        const currentShift = sorted.length>0 ? sorted[0][2] : null;

        // ★ 只取當班最新一筆（累計數字），不加總
        const shiftRows = currentShift ? sorted.filter(r=>r[2]===currentShift) : [];
        const latestRow = shiftRows.length > 0 ? shiftRows[0] : null;
        const todayRows = latestRow ? [{
          input:  latestRow[10]||0,
          good:   latestRow[11]||0,
          defect: latestRow[12]||0,
          rework: latestRow[13]||0,
          defectDetails: Array.from({length:14},(_,i)=>latestRow[14+i]||0),
        }] : [];
        const todayMach = machRows.filter(r=>r[3]===line);
        const activeMin = todayMach.reduce((s,r)=>s+Number(r[4]||0),0);
        const tuneMin   = todayMach.reduce((s,r)=>s+Number(r[5]||0),0);
        const stopMin   = todayMach.reduce((s,r)=>s+Number(r[6]||0),0);
        const idleMin   = todayMach.reduce((s,r)=>s+Number(r[12]||0),0);
        const totalMin  = activeMin+tuneMin+stopMin+idleMin;
        result[line] = { batch, todayRows, currentShift,
          machData:{ activeMin, tuneMin, stopMin, idleMin, oeeRate: totalMin>0?+(activeMin/totalMin*100).toFixed(1):0 }
        };
      });
      setLineData(result);
      setLastUpdate(new Date());
      countdownRef.current = REFRESH_INTERVAL/1000;
    } catch(e){ console.error(e); }
    setLoading(false);
  },[]);

  useEffect(()=>{
    fetchAll();
    const rt = setInterval(fetchAll, REFRESH_INTERVAL);
    const ct = setInterval(()=>{ countdownRef.current=Math.max(0,countdownRef.current-1); setCountdown(countdownRef.current); },1000);
    return ()=>{ clearInterval(rt); clearInterval(ct); };
  },[fetchAll]);

  const shiftCounts={};
  LINES.forEach(l=>{ const s=lineData[l]?.currentShift; if(s) shiftCounts[s]=(shiftCounts[s]||0)+1; });
  const detectedShift = Object.entries(shiftCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || '';

  const totalGood   = LINES.reduce((s,l)=>s+(lineData[l]?.todayRows||[]).reduce((ss,r)=>ss+(r.good||0),0),0);
  const totalTarget = LINES.reduce((s,l)=>s+(lineData[l]?.batch?.target||0),0);
  const totalRate   = totalTarget>0 ? (totalGood/totalTarget*100).toFixed(1) : '0.0';
  const rateColor   = Number(totalRate)>=90?'text-emerald-400':Number(totalRate)>=70?'text-amber-400':'text-red-400';

  return (
    <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,display:'flex',flexDirection:'column',padding:'8px',gap:'6px'}}>
      <div className="flex items-center gap-4 shrink-0 bg-slate-900/60 rounded-xl px-4 py-2">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 bg-cyan-500/20 border border-cyan-500/30 rounded-lg flex items-center justify-center">
            <i className="fa-solid fa-wave-square text-cyan-400 text-sm"></i>
          </div>
          <div>
            <div className="font-bold text-white text-base leading-none">熔接生產即時看板</div>
            <div className="text-slate-600 text-[10px]">Welding Area</div>
          </div>
        </div>
        {detectedShift && (
          <div className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1">
            <span className="text-amber-400 font-bold text-sm">⚡ {detectedShift}</span>
          </div>
        )}
        <div className="flex items-center gap-3 text-sm">
          <span className="text-slate-500">每日總目標</span>
          <span className="num font-bold text-white text-lg">{totalTarget.toLocaleString()}</span>
          <span className="text-slate-500">目前總達成</span>
          <span className="num font-bold text-cyan-400 text-lg">{totalGood.toLocaleString()}</span>
          <span className={`num font-bold text-xl ${rateColor}`}>{totalRate}%</span>
        </div>
        <div className="flex-1 h-2 bg-slate-800 rounded-full overflow-hidden">
          <div className={`h-full rounded-full transition-all duration-1000 ${Number(totalRate)>=90?'bg-cyan-500':Number(totalRate)>=70?'bg-amber-500':'bg-red-500'}`}
            style={{width:Math.min(100,Number(totalRate))+'%'}}></div>
        </div>
        <div className="flex items-center gap-3 shrink-0">
          <Clock />
          <div className="flex items-center gap-1.5 bg-slate-800 border border-slate-700 rounded-lg px-2.5 py-1.5">
            <div className={`w-1.5 h-1.5 rounded-full pulse-dot ${loading?'bg-amber-400':'bg-emerald-400'}`}></div>
            <span className="text-slate-500 text-xs">{loading?'更新中':countdown+'s'}</span>
          </div>
          <button onClick={fetchAll} className="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-400 hover:text-white px-2.5 py-1.5 rounded-lg text-xs font-bold transition-all">
            <i className="fa-solid fa-rotate-right mr-1"></i>更新
          </button>
        </div>
      </div>
      <div className="flex items-center gap-4 shrink-0 px-1">
        {[
          {color:'bg-emerald-500',label:'良率 ≥ 90%（優良）'},
          {color:'bg-amber-500', label:'良率 80-89%（警告）'},
          {color:'bg-red-500',   label:'良率 < 80%（異常）'},
        ].map(s=>(
          <div key={s.label} className="flex items-center gap-1.5">
            <div className={`w-2.5 h-2.5 rounded-sm ${s.color}`}></div>
            <span className="text-slate-500 text-xs">{s.label}</span>
          </div>
        ))}
        {lastUpdate && <span className="ml-auto text-slate-700 text-xs">最後更新：{lastUpdate.toLocaleTimeString('zh-TW',{hour12:false})}</span>}
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',gap:'4px',minHeight:0}}>
        {loading && !Object.keys(lineData).length ? (
          <div className="flex-1 flex items-center justify-center text-slate-600">
            <i className="fa-solid fa-spinner fa-spin text-2xl mr-3 text-cyan-500"></i>載入中...
          </div>
        ) : LINES.map((line,i) => (
          <LineCard key={line} line={line}
            lineColor={['#34d399','#60a5fa','#f59e0b','#f472b6','#a78bfa','#22d3ee','#fb923c','#86efac'][i]}
            data={lineData[line]}
            machData={lineData[line]?.machData}
            isOnline={!!onlineMap[line]}
          />
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
